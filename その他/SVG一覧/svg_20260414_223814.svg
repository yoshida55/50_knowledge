<svg width="700" height="420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">

  <!-- 背景 -->
  <rect width="700" height="420" fill="#f8f9fa"/>

  <!-- CPT UI ラベル -->
  <rect x="20" y="10" width="120" height="30" rx="6" fill="#6c757d"/>
  <text x="80" y="30" text-anchor="middle" fill="white" font-size="13" font-weight="bold">CPT UI で作る</text>

  <!-- 投稿タイプ ボックス -->
  <rect x="20" y="55" width="180" height="60" rx="8" fill="#4a90d9" stroke="#2c6fad" stroke-width="2"/>
  <text x="110" y="80" text-anchor="middle" fill="white" font-size="13" font-weight="bold">カスタム投稿タイプ</text>
  <text x="110" y="100" text-anchor="middle" fill="white" font-size="14">制作実績</text>

  <!-- タクソノミー ボックス -->
  <rect x="340" y="55" width="200" height="60" rx="8" fill="#e67e22" stroke="#b96319" stroke-width="2"/>
  <text x="440" y="80" text-anchor="middle" fill="white" font-size="13" font-weight="bold">カスタムタクソノミー</text>
  <text x="440" y="100" text-anchor="middle" fill="white" font-size="14">works-category</text>

  <!-- 紐付け矢印 -->
  <line x1="200" y1="85" x2="340" y2="85" stroke="#e74c3c" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="335,80 345,85 335,90" fill="#e74c3c"/>
  <text x="270" y="76" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">CPT UIで紐付け</text>

  <!-- 記事 ボックス -->
  <rect x="20" y="200" width="180" height="55" rx="8" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="110" y="223" text-anchor="middle" fill="white" font-size="13" font-weight="bold">個別の記事（投稿）</text>
  <text x="110" y="243" text-anchor="middle" fill="white" font-size="12">制作実績の1件1件</text>

  <!-- 投稿タイプ → 記事 矢印 -->
  <line x1="110" y1="115" x2="110" y2="200" stroke="#4a90d9" stroke-width="2"/>
  <polygon points="105,195 110,205 115,195" fill="#4a90d9"/>
  <text x="130" y="165" fill="#4a90d9" font-size="11">記事を追加</text>

  <!-- ターム ボックス群 -->
  <rect x="320" y="185" width="110" height="40" rx="6" fill="#f39c12" stroke="#d68910" stroke-width="1.5"/>
  <text x="375" y="210" text-anchor="middle" fill="white" font-size="13">Web制作</text>

  <rect x="445" y="185" width="110" height="40" rx="6" fill="#f39c12" stroke="#d68910" stroke-width="1.5"/>
  <text x="500" y="210" text-anchor="middle" fill="white" font-size="13">ロゴ制作</text>

  <rect x="570" y="185" width="110" height="40" rx="6" fill="#f39c12" stroke="#d68910" stroke-width="1.5"/>
  <text x="625" y="210" text-anchor="middle" fill="white" font-size="13">グラフィック</text>

  <!-- タクソノミー → ターム 矢印 -->
  <line x1="375" y1="115" x2="375" y2="185" stroke="#e67e22" stroke-width="2"/>
  <polygon points="370,180 375,190 380,180" fill="#e67e22"/>
  <line x1="500" y1="115" x2="500" y2="185" stroke="#e67e22" stroke-width="2"/>
  <polygon points="495,180 500,190 505,180" fill="#e67e22"/>
  <line x1="625" y1="115" x2="625" y2="185" stroke="#e67e22" stroke-width="2"/>
  <polygon points="620,180 625,190 630,180" fill="#e67e22"/>
  <text x="510" y="160" fill="#e67e22" font-size="11">ターム（実際の分類）</text>

  <!-- 記事にターム貼り付け矢印 -->
  <path d="M 200 227 Q 280 290 320 207" stroke="#8e44ad" stroke-width="2" fill="none" stroke-dasharray="5,4"/>
  <polygon points="315,200 325,208 317,215" fill="#8e44ad"/>
  <text x="230" y="300" fill="#8e44ad" font-size="12" font-weight="bold">記事にタームを設定する</text>
  <text x="230" y="316" fill="#8e44ad" font-size="11">（記事編集画面で選ぶ）</text>

  <!-- 凡例 -->
  <rect x="20" y="370" width="14" height="14" fill="#4a90d9"/>
  <text x="40" y="382" fill="#333" font-size="11">投稿タイプ</text>
  <rect x="120" y="370" width="14" height="14" fill="#e67e22"/>
  <text x="140" y="382" fill="#333" font-size="11">タクソノミー / ターム</text>
  <rect x="280" y="370" width="14" height="14" fill="#27ae60"/>
  <text x="300" y="382" fill="#333" font-size="11">個別の記事</text>
  <line x1="380" y1="377" x2="400" y2="377" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="406" y="382" fill="#333" font-size="11">CPT UIでの紐付け</text>

</svg>
