<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- 背景 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7971e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd200;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e96c75;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#533483;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="300" fill="url(#bgGrad)" />

  <!-- 太陽 -->
  <circle cx="200" cy="130" r="45" fill="url(#sunGrad)" opacity="0.9" />
  <!-- 太陽の光線 -->
  <g stroke="#ffd200" stroke-width="2" opacity="0.5">
    <line x1="200" y1="75" x2="200" y2="60" />
    <line x1="200" y1="185" x2="200" y2="200" />
    <line x1="145" y1="130" x2="130" y2="130" />
    <line x1="255" y1="130" x2="270" y2="130" />
    <line x1="159" y1="89"  x2="148" y2="78" />
    <line x1="241" y1="89"  x2="252" y2="78" />
    <line x1="159" y1="171" x2="148" y2="182" />
    <line x1="241" y1="171" x2="252" y2="182" />
  </g>

  <!-- 山（後ろ） -->
  <polygon points="0,220 100,100 200,220" fill="#c0392b" opacity="0.7" />
  <polygon points="150,220 280,80 400,220" fill="url(#mountainGrad)" opacity="0.85" />

  <!-- 雪 -->
  <polygon points="100,100 85,140 115,140" fill="white" opacity="0.85" />
  <polygon points="280,80 263,125 297,125" fill="white" opacity="0.85" />

  <!-- 海 -->
  <rect x="0" y="220" width="400" height="80" fill="url(#seaGrad)" />

  <!-- 波 -->
  <path d="M0,235 Q50,225 100,235 Q150,245 200,235 Q250,225 300,235 Q350,245 400,235"
        stroke="#74b9ff" stroke-width="2" fill="none" opacity="0.6" />
  <path d="M0,250 Q50,240 100,250 Q150,260 200,250 Q250,240 300,250 Q350,260 400,250"
        stroke="#74b9ff" stroke-width="1.5" fill="none" opacity="0.4" />

  <!-- 太陽の水面反射 -->
  <ellipse cx="200" cy="240" rx="30" ry="8" fill="#ffd200" opacity="0.2" />

  <!-- 星 -->
  <circle cx="40"  cy="30"  r="1.5" fill="white" opacity="0.8" />
  <circle cx="80"  cy="15"  r="1"   fill="white" opacity="0.6" />
  <circle cx="130" cy="40"  r="1.5" fill="white" opacity="0.7" />
  <circle cx="310" cy="20"  r="1"   fill="white" opacity="0.8" />
  <circle cx="360" cy="45"  r="1.5" fill="white" opacity="0.6" />
  <circle cx="380" cy="15"  r="1"   fill="white" opacity="0.7" />

  <!-- テキスト -->
  <text x="200" y="290"
        font-family="Georgia, serif" font-size="13"
        text-anchor="middle" fill="white" opacity="0.6" letter-spacing="3">
    S U N S E T
  </text>
</svg>
