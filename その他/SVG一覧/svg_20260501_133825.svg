<svg width="420" height="340" viewBox="0 0 420 340" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif;"> <!-- 背景 --> <rect width="420" height="340" fill="#fafaf7"/> <!-- タイトル -->
<text x="210" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#171b20">polygon() の座標の読み方</text>

<!-- 要素（灰色の矩形） --> <rect x="60" y="50" width="280" height="200" rx="6" fill="#e8edf0" stroke="#aab" stroke-width="1.5"/> <!-- X軸の矢印（上） --> <line x1="60" y1="38" x2="340" y2="38" stroke="#d86f45" stroke-width="2"/> <polygon points="340,34 350,38 340,42" fill="#d86f45"/> <text x="355" y="42" font-size="13" fill="#d86f45" font-weight="bold">X</text> <text x="60" y="32" font-size="11" fill="#d86f45">0%</text> <text x="326" y="32" font-size="11" fill="#d86f45">100%</text> <text x="190" y="32" font-size="11" fill="#d86f45">← 左右 →</text> <!-- Y軸の矢印（左） --> <line x1="42" y1="50" x2="42" y2="250" stroke="#3a6b5e" stroke-width="2"/> <polygon points="38,250 42,262 46,250" fill="#3a6b5e"/> <text x="30" y="270" font-size="13" fill="#3a6b5e" font-weight="bold">Y</text> <text x="20" y="55" font-size="11" fill="#3a6b5e">0%</text> <text x="14" y="254" font-size="11" fill="#3a6b5e">100%</text> <text x="6" y="155" font-size="11" fill="#3a6b5e" writing-mode="vertical-rl">上下 ↓</text> <!-- clip-path の shape --> <polygon points="60,50 340,50 340,250 60,190" fill="rgba(58,107,94,0.15)" stroke="#3a6b5e" stroke-width="2" stroke-dasharray="6,3"/> <!-- 4つの点 --> <!-- 左上 0 0 --> <circle cx="60" cy="50" r="6" fill="#d86f45"/> <text x="65" y="45" font-size="12" fill="#171b20" font-weight="bold">0 0</text> <text x="65" y="58" font-size="10" fill="#666">（左上）</text> <!-- 右上 100% 0 --> <circle cx="340" cy="50" r="6" fill="#d86f45"/> <text x="280" y="45" font-size="12" fill="#171b20" font-weight="bold">100% 0</text> <text x="285" y="58" font-size="10" fill="#666">（右上）</text> <!-- 右下 100% 100% --> <circle cx="340" cy="250" r="6" fill="#d86f45"/> <text x="280" y="270" font-size="12" fill="#171b20" font-weight="bold">100% 100%</text> <text x="295" y="282" font-size="10" fill="#666">（右下）</text> <!-- 左中 0 60% --> <circle cx="60" cy="190" r="6" fill="#d86f45"/> <text x="65" y="185" font-size="12" fill="#171b20" font-weight="bold">0 60%</text> <text x="65" y="198" font-size="10" fill="#666">（左の60%地点）</text> <!-- 斜めの説明矢印 --> <line x1="60" y1="190" x2="340" y2="250" stroke="#d86f45" stroke-width="2.5"/> <text x="145" y="240" font-size="12" fill="#d86f45" font-weight="bold">← 斜め（ここが台形の底辺）</text> <!-- コード --> <rect x="50" y="298" width="320" height="32" rx="6" fill="#171b20"/> <text x="210" y="319" text-anchor="middle" font-size="12" fill="#fafaf7" font-family="monospace">polygon(0 0, 100% 0, 100% 100%, 0 60%)</text> </svg>