<svg width="600" height="420" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">

  <!-- 左：2ボックスパターン -->
  <text x="80" y="24" font-size="13" fill="#333" text-anchor="middle">2ボックス（普通）</text>

  <!-- 黒セクション -->
  <rect x="10" y="36" width="140" height="70" fill="#222" rx="4"/>
  <text x="80" y="76" font-size="11" fill="#fff" text-anchor="middle">黒セクション</text>

  <!-- 白セクション -->
  <rect x="10" y="106" width="140" height="70" fill="#f5f5f5" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="80" y="146" font-size="11" fill="#333" text-anchor="middle">白セクション</text>

  <text x="80" y="200" font-size="11" fill="#888" text-anchor="middle">→ 上下に並べるだけ。簡単。</text>

  <!-- 右：親子パターン（カードが黒の中に浮く） -->
  <text x="440" y="24" font-size="13" fill="#333" text-anchor="middle">親子（カードが浮く）</text>

  <!-- 黒い親 -->
  <rect x="310" y="36" width="260" height="160" fill="#222" rx="4"/>
  <text x="440" y="58" font-size="11" fill="#888" text-anchor="middle">親：background: black</text>

  <!-- 白いカード（margin-top分下がっている） -->
  <rect x="340" y="76" width="200" height="100" fill="#fff" rx="6"/>
  <text x="440" y="122" font-size="12" fill="#333" text-anchor="middle">白いカード</text>
  <text x="440" y="142" font-size="10" fill="#999" text-anchor="middle">background: white</text>

  <!-- margin-top の矢印 -->
  <line x1="290" y1="36" x2="290" y2="76" stroke="#e55" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="284" y="58" font-size="10" fill="#e55" text-anchor="end">margin</text>
  <text x="284" y="70" font-size="10" fill="#e55" text-anchor="end">-top</text>

  <!-- 説明 -->
  <text x="440" y="218" font-size="11" fill="#888" text-anchor="middle">→ 黒の中にカードが埋まる見た目</text>

  <!-- 区切り線 -->
  <line x1="220" y1="30" x2="220" y2="230" stroke="#ddd" stroke-width="1"/>

  <!-- 下：使い分け -->
  <rect x="10" y="250" width="560" height="150" fill="#f9f9f9" stroke="#ddd" rx="6"/>
  <text x="290" y="278" font-size="13" fill="#333" text-anchor="middle" font-weight="bold">使い分け</text>

  <text x="30" y="308" font-size="12" fill="#333">✅ 普通の上下セクション</text>
  <text x="30" y="328" font-size="11" fill="#888">→ 2ボックスで十分。素直でわかりやすい。</text>

  <text x="30" y="358" font-size="12" fill="#333">✅ カードが黒背景の中に「浮いて見える」デザイン</text>
  <text x="30" y="378" font-size="11" fill="#888">→ 親子1セット。position不要で自然に作れる。</text>

</svg>