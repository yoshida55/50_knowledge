<svg width="1000" height="850" viewBox="0 0 1000 850" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="850" fill="#f6f4f0" />
  
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="18" height="18" fill="none" stroke="#2ecc71" stroke-width="2" stroke-dasharray="4,2" />
    <text x="25" y="15" font-family="monospace" font-size="14" fill="#333">grid (全体カラム分割 / 大枠ギャップ管理)</text>
    
    <rect x="350" y="0" width="18" height="18" fill="none" stroke="#3498db" stroke-width="2" />
    <text x="375" y="15" font-family="monospace" font-size="14" fill="#333">flex (横並び・位置揃え専用)</text>
    
    <rect x="620" y="0" width="18" height="18" fill="none" stroke="#e67e22" stroke-width="2" />
    <text x="645" y="15" font-family="monospace" font-size="14" fill="#333">block (通常フロー / margin制御)</text>
  </g>

  <rect x="20" y="60" width="960" height="760" fill="none" stroke="#2ecc71" stroke-width="2" stroke-dasharray="6,3" />
  <text x="30" y="85" font-family="monospace" font-size="12" fill="#27ae60">main [display: grid; grid-template-columns: 35% 1fr;]</text>

  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="320" height="700" fill="#ddd" stroke="#e67e22" stroke-width="2" />
    <text x="10" y="25" font-family="monospace" font-size="12" fill="#d35400">div.hero [aspect-ratio: auto; object-fit: cover;]</text>
    <text x="10" y="50" font-family="serif" font-size="18" fill="#555">溝田建築設計株式会社</text>
  </g>

  <g transform="translate(380, 100)">
    <rect x="540" y="0" width="40" height="40" rx="20" fill="none" stroke="#e67e22" stroke-width="2" />
    <text x="510" y="-10" font-family="monospace" font-size="12" fill="#d35400">button [position: absolute; top: 0; right: 0;]</text>
    <text x="553" y="25" font-family="sans-serif" font-size="16" fill="#333">X</text>

    <rect x="20" y="60" width="500" height="300" fill="none" stroke="#2ecc71" stroke-width="2" stroke-dasharray="6,3" />
    <text x="30" y="50" font-family="monospace" font-size="12" fill="#27ae60">nav [display: grid; grid-template-columns: 1fr 1fr; gap: 40px;]</text>
    
    <text x="40" y="100" font-family="serif" font-size="20" fill="#333">私たちについて</text>
    <text x="280" y="100" font-family="serif" font-size="20" fill="#333">施工事例</text>
    <text x="40" y="150" font-family="serif" font-size="20" fill="#333">家づくりのこだわり</text>
    <text x="280" y="150" font-family="serif" font-size="20" fill="#333">モデルハウス</text>
    
    <rect x="40" y="180" width="200" height="150" fill="none" stroke="#e67e22" stroke-width="1" />
    <text x="45" y="175" font-family="monospace" font-size="11" fill="#d35400">ul [block: margin-bottom stack]</text>
    <text x="50" y="210" font-family="sans-serif" font-size="14" fill="#666">超高気密 ＋ 超高断熱</text>
    <text x="50" y="240" font-family="sans-serif" font-size="14" fill="#666">パッシブ設計 ＋ 全館空調</text>
    <text x="50" y="270" font-family="sans-serif" font-size="14" fill="#666">...</text>

    <g transform="translate(20, 450)">
      <rect x="0" y="0" width="540" height="230" fill="none" stroke="#e67e22" stroke-width="2" />
      <text x="0" y="-10" font-family="monospace" font-size="12" fill="#d35400">footer.contact [block layout: margin-top: auto;]</text>

      <rect x="10" y="20" width="520" height="90" fill="none" stroke="#3498db" stroke-width="2" />
      <text x="15" y="15" font-family="monospace" font-size="12" fill="#2980b9">div.card [display: flex; align-items: center; justify-content: space-between;]</text>
      <text x="30" y="65" font-family="sans-serif" font-size="14" fill="#333">WEBからのお問い合わせ</text>
      <rect x="250" y="35" width="250" height="50" rx="25" fill="#c47e3a" />
      <text x="280" y="66" font-family="sans-serif" font-size="14" fill="#fff">お問い合わせフォームはこちら →</text>

      <rect x="10" y="125" width="520" height="90" fill="none" stroke="#3498db" stroke-width="2" />
      <text x="30" y="170" font-family="sans-serif" font-size="14" fill="#333">お電話からのお問い合わせ</text>
      <g transform="translate(250, 140)">
        <text x="0" y="30" font-family="serif" font-size="28" fill="#c47e3a">0964-27-5457</text>
        <text x="0" y="55" font-family="sans-serif" font-size="12" fill="#888">受付時間: 9:00〜17:30 | 定休日: 水曜日</text>
      </g>
    </g>
  </g>
</svg>