<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" font-family="monospace" font-size="13">

  <!-- index.php -->
  <rect x="20" y="20" width="160" height="60" rx="8" fill="#4A90D9" stroke="#2c6fad" stroke-width="2"/>
  <text x="100" y="45" text-anchor="middle" fill="white" font-weight="bold">index.php</text>
  <text x="100" y="65" text-anchor="middle" fill="white" font-size="11">get_header() を呼ぶ</text>

  <!-- arrow -->
  <line x1="100" y1="80" x2="100" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#333"/>
    </marker>
  </defs>

  <!-- header.php -->
  <rect x="20" y="120" width="160" height="80" rx="8" fill="#E8A838" stroke="#c47f10" stroke-width="2"/>
  <text x="100" y="145" text-anchor="middle" fill="white" font-weight="bold">header.php</text>
  <text x="100" y="163" text-anchor="middle" fill="white" font-size="11">① echo テンプレート名</text>
  <text x="100" y="183" text-anchor="middle" fill="white" font-size="11">② Test株式会社（改行なし）</text>

  <!-- output box -->
  <rect x="250" y="80" width="330" height="160" rx="8" fill="#f5f5f5" stroke="#aaa" stroke-width="1.5"/>
  <text x="415" y="100" text-anchor="middle" fill="#555" font-size="11">ブラウザの出力</text>

  <!-- output line 1 -->
  <rect x="265" y="110" width="300" height="28" rx="4" fill="#d4edda" stroke="#82c882" stroke-width="1"/>
  <text x="275" y="129" fill="#2a6e2a" font-size="11">【テンプレート】header.php</text>

  <!-- output line 2 (glued) -->
  <rect x="265" y="148" width="300" height="28" rx="4" fill="#f8d7da" stroke="#e08080" stroke-width="1"/>
  <text x="275" y="167" fill="#8b1a1a" font-size="11">【テンプレート】header.phpTest株式会社</text>

  <text x="415" y="220" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="bold">↑ &lt;br&gt;がないのでくっつく！</text>

  <!-- 2回呼ばれてる説明 -->
  <rect x="20" y="240" width="560" height="120" rx="8" fill="#fff3cd" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="40" y="265" fill="#856404" font-weight="bold">⚠ なぜ2回出るのか？</text>
  <text x="40" y="290" fill="#333" font-size="12">header.php のどこかで get_header() がもう1回呼ばれている</text>
  <text x="40" y="313" fill="#333" font-size="12">index.php → header.php → また get_header() → header.php（2回目）</text>
  <text x="40" y="336" fill="#c0392b" font-size="12" font-weight="bold">→ header.php の中に get_header() がないか確認！</text>

</svg>