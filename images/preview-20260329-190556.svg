<svg width="640" height="280" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">

  <!-- 左：正しい例 -->
  <text x="20" y="20" fill="#22c55e" font-weight="bold" font-size="14">✅ 正しい（子に writing-mode）</text>

  <!-- 親 flex コンテナ -->
  <rect x="20" y="30" width="260" height="100" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="30" y="48" fill="#15803d" font-size="11">.footer_area（display: flex）</text>

  <!-- 主軸矢印 → -->
  <line x1="30" y1="75" x2="260" y2="75" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="120" y="70" fill="#15803d" font-size="11">主軸 →</text>

  <!-- 子A -->
  <rect x="40" y="82" width="60" height="40" rx="4" fill="#bbf7d0" stroke="#22c55e"/>
  <text x="52" y="98" fill="#15803d" font-size="10">store</text>
  <text x="44" y="112" fill="#15803d" font-size="9">縦書き✓</text>

  <!-- 子B -->
  <rect x="120" y="82" width="60" height="40" rx="4" fill="#bbf7d0" stroke="#22c55e"/>
  <text x="132" y="98" fill="#15803d" font-size="10">inner</text>
  <text x="124" y="112" fill="#15803d" font-size="9">縦書き✓</text>

  <!-- 矢印定義 -->
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <text x="30" y="150" fill="#15803d" font-size="11">justify-content が横に効く → 正常</text>

  <!-- 右：間違い例 -->
  <text x="350" y="20" fill="#ef4444" font-weight="bold" font-size="14">❌ 間違い（親に writing-mode）</text>

  <!-- 親 flex コンテナ -->
  <rect x="350" y="30" width="260" height="100" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="360" y="48" fill="#b91c1c" font-size="11">.footer_area（flex + writing-mode）</text>

  <!-- 主軸矢印 ↓（縦に回転） -->
  <line x1="490" y1="55" x2="490" y2="120" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="498" y="95" fill="#b91c1c" font-size="11">主軸↓</text>
  <text x="355" y="70" fill="#b91c1c" font-size="10">（縦方向に変わる！）</text>

  <!-- 子A（縦に積まれる） -->
  <rect x="390" y="58" width="80" height="22" rx="4" fill="#fecaca" stroke="#ef4444"/>
  <text x="415" y="74" fill="#b91c1c" font-size="10">store</text>

  <!-- 子B（縦に積まれる） -->
  <rect x="390" y="88" width="80" height="22" rx="4" fill="#fecaca" stroke="#ef4444"/>
  <text x="415" y="104" fill="#b91c1c" font-size="10">inner</text>

  <text x="355" y="150" fill="#b91c1c" font-size="11">justify-content が縦に効く → レイアウト崩れ</text>

  <!-- 下部まとめ -->
  <rect x="20" y="175" width="590" height="90" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="35" y="198" fill="#334155" font-size="13" font-weight="bold">📌 まとめ</text>
  <text x="35" y="218" fill="#334155" font-size="12">writing-mode を付けた要素は「縦横の概念が回転」する</text>
  <text x="35" y="236" fill="#334155" font-size="12">flex の親に付けると → justify / align の効く方向が入れ替わる</text>
  <text x="35" y="254" fill="#22c55e" font-size="12" font-weight="bold">✅ 子要素に個別に付けることで、flexレイアウトへの影響を防げる</text>
</svg>