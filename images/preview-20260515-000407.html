<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>紙飛行機のやさしい導線デモ</title>

  <style>
    body {
      margin: 0;
      font-family: "Noto Sans JP", sans-serif;
      background: #ffffff;
      color: #24384d;
    }

    .support-flow {
      position: relative;
      padding: 100px 24px;
      background: linear-gradient(180deg, #f7fbff 0%, #ffffff 100%);
      overflow: hidden;
    }

    .line-svg {
      position: absolute;
      top: 40px;
      left: 50%;
      width: 100%;
      max-width: 1000px;
      transform: translateX(-50%);
      opacity: 0.55;
      pointer-events: none;
    }

    .path-line {
      stroke-dasharray: 12 16;
      animation: dashMove 3s linear infinite;
    }

    @keyframes dashMove {
      from {
        stroke-dashoffset: 0;
      }
      to {
        stroke-dashoffset: -56;
      }
    }

    .flow-content {
      position: relative;
      max-width: 1040px;
      margin: 0 auto;
      text-align: center;
      z-index: 2;
    }

    .label {
      color: #78BEE6;
      font-weight: 700;
      letter-spacing: 0.14em;
      margin-bottom: 12px;
    }

    h2 {
      font-size: clamp(28px, 4vw, 42px);
      margin: 0 0 20px;
      line-height: 1.4;
    }

    .lead {
      color: #5b6f82;
      line-height: 1.9;
      margin-bottom: 50px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #dcecf6;
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 12px 30px rgba(80, 140, 180, 0.12);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 40px rgba(80, 140, 180, 0.18);
    }

    .card span {
      color: #78BEE6;
      font-weight: 800;
      font-size: 15px;
    }

    .card h3 {
      font-size: 22px;
      margin: 12px 0;
    }

    .card p {
      color: #5b6f82;
      line-height: 1.8;
      margin: 0;
    }

    @media (max-width: 768px) {
      .support-flow {
        padding: 80px 18px;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .line-svg {
        top: 20px;
        opacity: 0.3;
      }
    }
  </style>
</head>

<body>

  <section class="support-flow">
    <svg viewBox="0 0 900 260" class="line-svg" aria-hidden="true">
      <path
        class="path-line"
        d="M60 170 C180 80, 300 230, 430 140 S680 70, 820 150"
        fill="none"
        stroke="#78BEE6"
        stroke-width="4"
        stroke-linecap="round"
      />

      <polygon
        points="820,150 785,135 795,155 785,175"
        fill="#78BEE6"
      />
    </svg>

    <div class="flow-content">
      <p class="label">SUPPORT STEP</p>

      <h2>一歩ずつ、働く準備を進める。</h2>

      <p class="lead">
        見学から体験、そして自分に合った作業へ。<br>
        スタッフがそばでサポートします。
      </p>

      <div class="cards">
        <div class="card">
          <span>01</span>
          <h3>見学</h3>
          <p>まずは事業所の雰囲気を見て、不安なことを相談できます。</p>
        </div>

        <div class="card">
          <span>02</span>
          <h3>体験</h3>
          <p>実際の作業を少しずつ試しながら、自分に合うか確認できます。</p>
        </div>

        <div class="card">
          <span>03</span>
          <h3>スタート</h3>
          <p>無理のないペースで通所を始め、働く準備を進めます。</p>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
