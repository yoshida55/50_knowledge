<svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" style="max-width:100%"> <!-- 背景 --> <rect width="600" height="420" fill="#f8f8f8" rx="8"/> <!-- タイトル -->
<text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">max-width の仕組み</text>

<!-- ===== NG例 ===== -->
<text x="20" y="60" font-size="13" font-weight="bold" fill="#e53935">❌ 今の状態（wrapperなし）</text>

<!-- 画面幅 --> <rect x="20" y="70" width="560" height="80" fill="#ffcdd2" stroke="#e53935" stroke-width="2" rx="4"/> <text x="300" y="90" text-anchor="middle" font-size="11" fill="#e53935">画面幅 1421px</text> <!-- products_area（広がってしまう） --> <rect x="20" y="95" width="560" height="45" fill="#ef9a9a" stroke="#e53935" stroke-width="1.5" rx="3"/> <text x="300" y="122" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">.products_area → 1421px（画面いっぱいに広がる）</text> <!-- 矢印 --> <line x1="300" y1="165" x2="300" y2="185" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/> <!-- ===== OK例 ===== -->
<text x="20" y="205" font-size="13" font-weight="bold" fill="#2e7d32">✅ 正しい状態（wrapperあり）</text>

<!-- 画面幅 --> <rect x="20" y="215" width="560" height="130" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" rx="4"/> <text x="300" y="233" text-anchor="middle" font-size="11" fill="#2e7d32">画面幅 1421px</text> <!-- wrapper --> <rect x="100" y="240" width="400" height="95" fill="#a5d6a7" stroke="#388e3c" stroke-width="2" rx="4"/> <text x="300" y="258" text-anchor="middle" font-size="11" font-weight="bold" fill="#1b5e20">.wrapper（max-width: 1360px）</text> <!-- products_area（制限される） --> <rect x="115" y="265" width="370" height="55" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5" rx="3"/> <text x="300" y="287" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">.products_area → 1360px以内に収まる</text> <text x="300" y="306" text-anchor="middle" font-size="10" fill="#fff">（wrapperに入ることで自動的に制限される）</text> <!-- ===== HTMLコード ===== --> <rect x="20" y="365" width="560" height="45" fill="#fff" stroke="#ccc" stroke-width="1" rx="4"/> <text x="35" y="382" font-size="11" fill="#555" font-family="monospace">&lt;div class="wrapper"&gt; ← max-width: 1360px を設定</text> <text x="35" y="400" font-size="11" fill="#555" font-family="monospace"> &lt;section class="products_area"&gt; ← 自動で1360px以内になる</text> <!-- 矢印マーカー --> <defs> <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"> <path d="M0,0 L8,4 L0,8 Z" fill="#888"/> </marker> </defs> </svg>