<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13"> <!-- 左：通常レイアウト -->
<text x="80" y="24" text-anchor="middle" font-size="12" fill="#555">通常（block）</text>
<rect x="20" y="35" width="120" height="340" rx="6" fill="#f0f0f0" stroke="#ccc"/>
<rect x="30" y="45" width="100" height="40" rx="4" fill="#90caf9"/>
<text x="80" y="70" text-anchor="middle" fill="#333">header</text>
<rect x="30" y="95" width="100" height="80" rx="4" fill="#a5d6a7"/>
<text x="80" y="140" text-anchor="middle" fill="#333">main</text>
<rect x="30" y="185" width="100" height="40" rx="4" fill="#ffcc80"/>
<text x="80" y="210" text-anchor="middle" fill="#333">footer</text>

<!-- 空白エリア --> <rect x="30" y="235" width="100" height="130" rx="4" fill="#e0e0e0" stroke="#bbb" stroke-dasharray="4"/> <text x="80" y="295" text-anchor="middle" fill="#999" font-size="11">空白</text> <text x="80" y="312" text-anchor="middle" fill="#999" font-size="11">（余白の概念なし）</text> <!-- 下矢印なし、footerが中途半端な位置 --> <text x="80" y="395" text-anchor="middle" font-size="11" fill="#e53935">footerが下に来ない</text> <!-- 矢印 -->
<text x="220" y="220" font-size="22" fill="#888">→</text>
<text x="205" y="210" font-size="10" fill="#888">flexbox</text>
<text x="205" y="235" font-size="10" fill="#888">追加</text>

<!-- 中央：flexbox追加・main普通 -->
<text x="330" y="24" text-anchor="middle" font-size="12" fill="#555">flex-direction: column</text>
<rect x="270" y="35" width="120" height="340" rx="6" fill="#f0f0f0" stroke="#1976d2" stroke-width="2"/>
<rect x="280" y="45" width="100" height="40" rx="4" fill="#90caf9"/>
<text x="330" y="70" text-anchor="middle" fill="#333">header</text>
<rect x="280" y="95" width="100" height="80" rx="4" fill="#a5d6a7"/>
<text x="330" y="140" text-anchor="middle" fill="#333">main</text>
<rect x="280" y="185" width="100" height="40" rx="4" fill="#ffcc80"/>
<text x="330" y="210" text-anchor="middle" fill="#333">footer</text>

<!-- 余ったスペース（概念あり） --> <rect x="280" y="235" width="100" height="130" rx="4" fill="#fff9c4" stroke="#f9a825" stroke-dasharray="4"/> <text x="330" y="290" text-anchor="middle" fill="#f57f17" font-size="11">余ったスペース</text> <text x="330" y="307" text-anchor="middle" fill="#f57f17" font-size="11">（概念が生まれた）</text> <text x="330" y="395" text-anchor="middle" font-size="11" fill="#e53935">まだ下に来ない</text> <!-- 矢印2 -->
<text x="470" y="220" font-size="22" fill="#888">→</text>
<text x="455" y="210" font-size="10" fill="#888">main に</text>
<text x="455" y="225" font-size="10" fill="#888">flex: 1</text>

<!-- 右：flex:1 適用 -->
<text x="575" y="24" text-anchor="middle" font-size="12" fill="#555">main に flex: 1</text>
<rect x="515" y="35" width="120" height="340" rx="6" fill="#f0f0f0" stroke="#1976d2" stroke-width="2"/>
<rect x="525" y="45" width="100" height="40" rx="4" fill="#90caf9"/>
<text x="575" y="70" text-anchor="middle" fill="#333">header</text>

<!-- mainが伸びる --> <rect x="525" y="95" width="100" height="210" rx="4" fill="#66bb6a"/> <text x="575" y="195" text-anchor="middle" fill="#fff">main</text> <text x="575" y="213" text-anchor="middle" fill="#fff" font-size="11">（伸びた）</text> <rect x="525" y="315" width="100" height="40" rx="4" fill="#ffcc80"/> <text x="575" y="340" text-anchor="middle" fill="#333">footer</text> <text x="575" y="395" text-anchor="middle" font-size