<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- グループA (z-index: 1) -->
  <rect x="20" y="40" width="160" height="140" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="30" y="60" font-size="12" fill="#1d4ed8">.box-a ( z-index: 1 )</text>

  <!-- child (z-index: 9999 だがグループA内だけ) -->
  <rect x="40" y="80" width="120" height="60" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/>
  <text x="50" y="105" font-size="11" fill="#1e3a8a">.child</text>
  <text x="50" y="120" font-size="10" fill="#1e3a8a">z-index: 9999</text>

  <!-- グループB (z-index: 2 → box-a全体より上) -->
  <rect x="180" y="80" width="180" height="100" fill="#fef08a" stroke="#ca8a04" stroke-width="2" opacity="0.95"/>
  <text x="190" y="100" font-size="12" fill="#854d0e">.box-b ( z-index: 2 )</text>
  <text x="190" y="120" font-size="10" fill="#854d0e">グループAより上なので</text>
  <text x="190" y="135" font-size="10" fill="#854d0e">child の 9999 に勝てる</text>
</svg>