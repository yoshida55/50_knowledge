<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg"> <!-- 背景 --> <rect width="600" height="400" fill="#f8f9fa" /> <!-- 画面（ブラウザの窓） --> <rect x="50" y="50" width="200" height="250" fill="none" stroke="#ff4d4d" stroke-width="4" stroke-dasharray="8,4" /> <text x="60" y="80" font-family="sans-serif" font-size="14" fill="#ff4d4d">窓 (windowHeight)</text> <!-- ゴールテープ（windowHeightのライン） --> <line x1="50" y1="300" x2="350" y2="300" stroke="#007bff" stroke-width="3" /> <text x="360" y="305" font-family="sans-serif" font-size="14" fill="#007bff">判定ライン (windowHeight地点)</text> <!-- ターゲット要素（スクロール前） --> <rect x="70" y="350" width="160" height="40" fill="#28a745" opacity="0.5" /> <text x="80" y="375" font-family="sans-serif" font-size="12" fill="white">infoTitle (まだ下にある)</text> <!-- 距離の説明 --> <path d="M 300 50 L 300 350" fill="none" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" /> <text x="310" y="200" font-family="sans-serif" font-size="14" fill="#6c757d">距離 (infoTitleTop)</text> <!-- スクロールすると... --> <path d="M 450 300 L 450 150" fill="none" stroke="#28a745" stroke-width="4" marker-end="url(#arrow)" /> <text x="460" y="230" font-family="sans-serif" font-size="14" fill="#28a745">上に移動！</text> <!-- 矢印定義 --> <defs> <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"> <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c757d" /> </marker> </defs> </svg>