<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="650" fill="#f6f4f0" />
  
  <g transform="translate(20, 20)">
    <rect width="960" height="50" rx="5" fill="#222" />
    <g transform="translate(20, 15)">
      <rect width="18" height="18" fill="none" stroke="#00C853" stroke-width="2" stroke-dasharray="4 2" />
      <text x="25" y="14" fill="#00C853" font-family="monospace" font-size="12" font-weight="bold">grid (全体カラム分割/ギャップ管理)</text>
      
      <rect x="280" width="18" height="18" fill="none" stroke="#2979FF" stroke-width="2" />
      <text x="305" y="14" fill="#2979FF" font-family="monospace" font-size="12" font-weight="bold">flex (横並び・位置揃え専用)</text>
      
      <rect x="520" width="18" height="18" fill="none" stroke="#FF9100" stroke-width="2" />
      <text x="545" y="14" fill="#FF9100" font-family="monospace" font-size="12" font-weight="bold">block (通常フロー + margin-bottom)</text>
    </g>
  </g>

  <g transform="translate(20, 90)">
    <rect width="960" height="520" fill="none" stroke="#00C853" stroke-width="2" stroke-dasharray="8 4" />
    <text x="10" y="-10" fill="#00C853" font-family="monospace" font-size="14" font-weight="bold">section [display: grid; grid-template-columns: 3.5fr 6.5fr; gap: 60px; align-items: start;]</text>

    <g transform="translate(30, 40)">
      <rect width="300" height="440" fill="none" stroke="#FF9100" stroke-width="2" />
      <text x="10" y="20" fill="#FF9100" font-family="monospace" font-size="12">header [block layout: margin-bottom]</text>
      
      <text x="20" y="60" fill="#555" font-family="serif" font-size="14">Contact</text>
      <text x="20" y="110" fill="#555" font-family="serif" font-size="36" font-weight="bold">お問い合わせ</text>
      <text x="20" y="170" fill="#555" font-family="sans-serif" font-size="14">お問い合わせはフォーム、または、</text>
      <text x="20" y="195" fill="#555" font-family="sans-serif" font-size="14">お電話より、お気軽にご連絡ください。</text>
    </g>

    <g transform="translate(370, 40)">
      <rect width="560" height="440" fill="none" stroke="#FF9100" stroke-width="2" stroke-dasharray="2 2" />
      <text x="10" y="-10" fill="#FF9100" font-family="monospace" font-size="12">div [stack layout: margin-bottom or parent gap]</text>

      <g transform="translate(10, 10)">
        <rect width="540" height="130" fill="#fff" stroke="#2979FF" stroke-width="2" />
        <text x="10" y="-8" fill="#2979FF" font-family="monospace" font-size="11">a.card [display: flex; justify-content: space-between; align-items: center; padding: 40px;]</text>
        
        <text x="40" y="70" fill="#333" font-family="sans-serif" font-size="16" font-weight="bold">WEBからのお問い合わせ</text>
        <rect x="260" y="35" width="240" height="60" rx="30" fill="#B67A3D" />
        <text x="285" y="70" fill="#fff" font-family="sans-serif" font-size="14">お問い合わせフォームはこちら</text>
        <circle cx="475" cy="65" r="15" fill="none" stroke="#fff" stroke-opacity="0.5" />
      </g>

      <g transform="translate(10, 160)">
        <rect width="540" height="160" fill="#fff" stroke="#2979FF" stroke-width="2" />
        <text x="10" y="-8" fill="#2979FF" font-family="monospace" font-size="11">div.card [display: flex; justify-content: space-between; align-items: center; padding: 40px;]</text>
        
        <text x="40" y="85" fill="#333" font-family="sans-serif" font-size="16" font-weight="bold">お電話からのお問い合わせ</text>
        
        <g transform="translate(260, 45)">
           <rect width="250" height="70" fill="none" stroke="#FF9100" stroke-width="1" stroke-dasharray="2 2" />
           <text x="5" y="-5" fill="#FF9100" font-family="monospace" font-size="10">div [block layout]</text>
           <text x="10" y="35" fill="#B67A3D" font-family="sans-serif" font-size="32">0964-27-5457</text>
           <text x="10" y="60" fill="#888" font-family="sans-serif" font-size="12">受付時間：9:00〜17:30 ｜ 定休日：水曜日</text>
        </g>
      </g>

      <g transform="translate(10, 360)">
        <rect width="540" height="50" fill="none" stroke="#2979FF" stroke-width="2" />
        <text x="10" y="-8" fill="#2979FF" font-family="monospace" font-size="11">ul [display: flex; gap: 30px; list-style: none;]</text>
        
        <g transform="translate(20, 15)">
          <circle cx="15" cy="10" r="12" fill="none" stroke="#ccc" stroke-width="1" />
          <text x="35" y="15" fill="#333" font-family="sans-serif" font-size="14">モデルハウス一覧</text>
        </g>
        <g transform="translate(180, 15)">
          <circle cx="15" cy="10" r="12" fill="none" stroke="#ccc" stroke-width="1" />
          <text x="35" y="15" fill="#333" font-family="sans-serif" font-size="14">土地・分譲情報</text>
        </g>
      </g>
    </g>
  </g>
</svg>