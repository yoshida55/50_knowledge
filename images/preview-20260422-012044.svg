<svg width="560" height="320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">

  <!-- flex-shrink: 1 (default) -->
  <text x="20" y="25" font-weight="bold" fill="#333">flex-shrink: 1（デフォルト）</text>

  <!-- 前 -->
  <text x="20" y="50" fill="#888" font-size="11">親: 300px</text>
  <rect x="20" y="58" width="300" height="44" rx="4" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.5"/>
  <rect x="22" y="60" width="140" height="40" rx="3" fill="#4a90d9"/>
  <text x="92" y="85" fill="white" text-anchor="middle" font-size="12">子 150px</text>
  <rect x="164" y="60" width="140" height="40" rx="3" fill="#4a90d9"/>
  <text x="234" y="85" fill="white" text-anchor="middle" font-size="12">子 150px</text>

  <!-- 矢印 -->
  <text x="340" y="85" fill="#e53935" font-size="20">→</text>
  <text x="335" y="105" fill="#e53935" font-size="11">親が縮む</text>

  <!-- 後 -->
  <text x="390" y="50" fill="#888" font-size="11">親: 160px</text>
  <rect x="390" y="58" width="160" height="44" rx="4" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.5"/>
  <rect x="392" y="60" width="76" height="40" rx="3" fill="#4a90d9"/>
  <text x="430" y="85" fill="white" text-anchor="middle" font-size="11">子 80px</text>
  <rect x="470" y="60" width="76" height="40" rx="3" fill="#4a90d9"/>
  <text x="508" y="85" fill="white" text-anchor="middle" font-size="11">子 80px</text>
  <text x="390" y="120" fill="#e53935" font-size="11">⚠ 子も縮んで全部見える</text>

  <!-- 区切り線 -->
  <line x1="10" y1="140" x2="550" y2="140" stroke="#ddd" stroke-width="1"/>

  <!-- flex-shrink: 0 -->
  <text x="20" y="165" font-weight="bold" fill="#333">flex-shrink: 0</text>

  <!-- 前 -->
  <text x="20" y="190" fill="#888" font-size="11">親: 300px</text>
  <rect x="20" y="198" width="300" height="44" rx="4" fill="#e8f4eb" stroke="#43a047" stroke-width="1.5"/>
  <rect x="22" y="200" width="140" height="40" rx="3" fill="#43a047"/>
  <text x="92" y="225" fill="white" text-anchor="middle" font-size="12">子 150px</text>
  <rect x="164" y="200" width="140" height="40" rx="3" fill="#43a047"/>
  <text x="234" y="225" fill="white" text-anchor="middle" font-size="12">子 150px</text>

  <!-- 矢印 -->
  <text x="340" y="225" fill="#e53935" font-size="20">→</text>
  <text x="335" y="245" fill="#e53935" font-size="11">親が縮む</text>

  <!-- 後（overflow: hidden で右がはみ出して隠れる） -->
  <text x="390" y="190" fill="#888" font-size="11">親: 160px</text>
  <clipPath id="clip1">
    <rect x="390" y="198" width="160" height="44"/>
  </clipPath>
  <rect x="390" y="198" width="160" height="44" rx="4" fill="#e8f4eb" stroke="#43a047" stroke-width="1.5"/>
  <g clip-path="url(#clip1)">
    <rect x="392" y="200" width="148" height="40" rx="3" fill="#43a047"/>
    <text x="466" y="225" fill="white" text-anchor="middle" font-size="12">子 150px</text>
    <rect x="542" y="200" width="148" height="40" rx="3" fill="#a5d6a7"/>
    <text x="616" y="225" fill="white" text-anchor="middle" font-size="12">子 150px</text>
  </g>
  <text x="390" y="258" fill="#43a047" font-size="11">✅ 子は150px維持・右がはみ出して隠れる</text>
  <text x="390" y="272" fill="#43a047" font-size="11">  → overflow: hidden でスライダーになる！</text>

</svg>