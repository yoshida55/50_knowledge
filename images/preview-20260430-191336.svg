<svg width="600" height="385" viewBox="0 0 600 385" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur5">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="clip-L">
      <rect x="10" y="45" width="270" height="220" rx="10"/>
    </clipPath>
    <clipPath id="clip-R">
      <rect x="320" y="45" width="270" height="220" rx="10"/>
    </clipPath>
    <clipPath id="clip-card">
      <rect x="348" y="148" width="214" height="94" rx="10"/>
    </clipPath>
  </defs>

  <!-- タイトル -->
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222" font-family="sans-serif">backdrop-filter の仕組み</text>

  <!-- ===== 左パネル：backdrop-filter なし ===== -->
  <g clip-path="url(#clip-L)">
    <rect x="10" y="45" width="270" height="220" fill="#1e1e2e"/>
    <circle cx="60"  cy="90"  r="60" fill="#f72585" opacity="0.8"/>
    <circle cx="200" cy="130" r="70" fill="#4cc9f0" opacity="0.65"/>
    <circle cx="90"  cy="230" r="55" fill="#7209b7" opacity="0.8"/>
    <circle cx="250" cy="215" r="45" fill="#4361ee" opacity="0.7"/>
    <!-- 不透明カード -->
    <rect x="38" y="148" width="214" height="94" rx="10" fill="white"/>
    <text x="145" y="193" text-anchor="middle" font-size="12" font-weight="bold" fill="#333" font-family="sans-serif">カードのテキスト</text>
    <text x="145" y="213" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">背景が完全に隠れる</text>
  </g>
  <rect x="10" y="45" width="270" height="220" rx="10" fill="none" stroke="#444" stroke-width="1"/>
  <text x="145" y="285" text-anchor="middle" font-size="12" fill="#cc0000" font-family="sans-serif">❌ backdrop-filter なし</text>
  <text x="145" y="302" text-anchor="middle" font-size="10" fill="#999" font-family="sans-serif">background: white（不透明）</text>

  <!-- 矢印 -->
  <text x="300" y="168" text-anchor="middle" font-size="26" fill="#888">→</text>

  <!-- ===== 右パネル：backdrop-filter あり ===== -->
  <g clip-path="url(#clip-R)">
    <rect x="320" y="45" width="270" height="220" fill="#1e1e2e"/>
    <!-- 背景の円（カード外は普通に描画） -->
    <circle cx="370" cy="90"  r="60" fill="#f72585" opacity="0.8"/>
    <circle cx="510" cy="130" r="70" fill="#4cc9f0" opacity="0.65"/>
    <circle cx="400" cy="230" r="55" fill="#7209b7" opacity="0.8"/>
    <circle cx="560" cy="215" r="45" fill="#4361ee" opacity="0.7"/>

    <!-- カード範囲だけブラー（backdrop-filter のシミュレーション） -->
    <g clip-path="url(#clip-card)">
      <rect x="320" y="45" width="270" height="220" fill="#1e1e2e"/>
      <g filter="url(#blur5)">
        <circle cx="370" cy="90"  r="60" fill="#f72585" opacity="0.8"/>
        <circle cx="510" cy="130" r="70" fill="#4cc9f0" opacity="0.65"/>
        <circle cx="400" cy="230" r="55" fill="#7209b7" opacity="0.8"/>
        <circle cx="560" cy="215" r="45" fill="#4361ee" opacity="0.7"/>
      </g>
    </g>

    <!-- 半透明カード -->
    <rect x="348" y="148" width="214" height="94" rx="10" fill="white" fill-opacity="0.18" stroke="white" stroke-opacity="0.45" stroke-width="1.5"/>
    <text x="455" y="193" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="sans-serif">カードのテキスト</text>
    <text x="455" y="213" text-anchor="middle" font-size="10" fill="white" fill-opacity="0.85" font-family="sans-serif">うしろがぼけて透ける</text>
  </g>
  <rect x="320" y="45" width="270" height="220" rx="10" fill="none" stroke="#444" stroke-width="1"/>
  <text x="455" y="285" text-anchor="middle" font-size="12" fill="#00a878" font-family="sans-serif">✅ backdrop-filter: blur()</text>
  <text x="455" y="302" text-anchor="middle" font-size="10" fill="#999" font-family="sans-serif">background: rgba(255,255,255,0.18)</text>

  <!-- ===== 下部：ポイント説明 ===== -->
  <rect x="10" y="318" width="580" height="62" rx="8" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="1"/>
  <text x="20" y="338" font-size="11" font-weight="bold" fill="#555" font-family="sans-serif">💡 ポイント</text>
  <text x="20" y="356" font-size="11" fill="#333" font-family="sans-serif">① backdrop-filter はカードの「うしろ」だけをぼかす（カード自身ではない）</text>
  <text x="20" y="373" font-size="11" fill="#333" font-family="sans-serif">② background が rgba()（半透明）でないと、うしろが透けないので効果が見えない</text>
</svg>