<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="100%" height="100%" style="background-color: #f6f4f0; font-family: sans-serif;">
  
  <rect x="0" y="0" width="1000" height="50" fill="#1a1a1a" />
  
  <rect x="20" y="15" width="20" height="20" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="50" y="30" fill="#22c55e" font-size="14" font-weight="bold">grid (全体カラム分割)</text>

  <rect x="220" y="15" width="20" height="20" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <text x="250" y="30" fill="#3b82f6" font-size="14" font-weight="bold">flex (row: 横並び専用)</text>

  <rect x="440" y="15" width="20" height="20" fill="none" stroke="#f97316" stroke-width="3"/>
  <text x="470" y="30" fill="#f97316" font-size="14" font-weight="bold">block (通常ブロック配置 + margin)</text>

  <rect x="20" y="70" width="960" height="470" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="8 8" />
  <text x="25" y="88" fill="#22c55e" font-family="monospace" font-size="12" font-weight="bold">section [display: grid; grid-template-columns: 3fr 7fr; gap: 40px;]</text>

  <rect x="40" y="110" width="270" height="410" fill="none" stroke="#f97316" stroke-width="2" />
  <text x="45" y="128" fill="#f97316" font-family="monospace" font-size="11">header [block layout: h2, p + margin-bottom]</text>

  <text x="50" y="170" fill="#666" font-size="12">Contact</text>
  <text x="50" y="210" fill="#5c4033" font-size="32" font-weight="bold" font-family="serif">お問い合わせ</text>
  
  <text x="50" y="270" fill="#333" font-size="12">お問い合わせはフォーム、または、</text>
  <text x="50" y="295" fill="#333" font-size="12">お電話より、お気軽にご連絡ください。</text>

  <rect x="340" y="110" width="620" height="410" fill="none" stroke="#f97316" stroke-width="2" />
  <text x="345" y="128" fill="#f97316" font-family="monospace" font-size="11">div [block layout: margin-bottomで縦積み]</text>

  <rect x="360" y="145" width="580" height="120" fill="#fffaf4" stroke="#3b82f6" stroke-width="2" />
  <text x="365" y="160" fill="#3b82f6" font-family="monospace" font-size="11">a.card [display: flex; align-items: center; justify-content: space-between;]</text>
  
  <text x="400" y="215" fill="#333" font-size="14" font-weight="bold">WEBからのお問い合わせ</text>
  <line x1="560" y1="180" x2="560" y2="230" stroke="#ddd" stroke-width="1" />
  
  <rect x="590" y="185" width="310" height="45" rx="22.5" fill="#bb763a" />
  <text x="610" y="212" fill="#fff" font-size="13">お問い合わせフォームはこちら</text>
  <circle cx="875" cy="207.5" r="12" fill="none" stroke="#fff" stroke-width="1" opacity="0.7"/>
  <text x="871" y="211" fill="#fff" font-size="12">→</text>

  <rect x="360" y="285" width="580" height="130" fill="#fffaf4" stroke="#3b82f6" stroke-width="2" />
  <text x="365" y="300" fill="#3b82f6" font-family="monospace" font-size="11">div.card [display: flex; align-items: center; justify-content: space-between;]</text>

  <text x="400" y="360" fill="#333" font-size="14" font-weight="bold">お電話からのお問い合わせ</text>
  <line x1="560" y1="325" x2="560" y2="385" stroke="#ddd" stroke-width="1" />
  
  <rect x="580" y="325" width="340" height="70" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="2 2" />
  <text x="582" y="338" fill="#f97316" font-family="monospace" font-size="10">div [block layout]</text>
  
  <text x="590" y="365" fill="#c68a53" font-size="34" font-weight="300" font-family="serif">0964-27-5457</text>
  <text x="590" y="385" fill="#999" font-size="11">受付時間：9:00〜17:30 ｜ 定休日：水曜日</text>

  <rect x="360" y="440" width="580" height="60" fill="none" stroke="#3b82f6" stroke-width="2" />
  <text x="365" y="455" fill="#3b82f6" font-family="monospace" font-size="11">ul [display: flex; gap: 30px;]</text>

  <circle cx="390" cy="477" r="10" fill="none" stroke="#e0d7c6" stroke-width="1" />
  <text x="386" y="480" fill="#bb763a" font-size="10">→</text>
  <text x="410" y="481" fill="#333" font-size="12">モデルハウス一覧</text>

  <circle cx="510" cy="477" r="10" fill="none" stroke="#e0d7c6" stroke-width="1" />
  <text x="506" y="480" fill="#bb763a" font-size="10">→</text>
  <text x="530" y="481" fill="#333" font-size="12">土地・分譲情報</text>

</svg>