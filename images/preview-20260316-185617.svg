  <rect x="350" y="50" width="200" height="150" rx="10" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="450" y="80" text-anchor="middle" font-family="sans-serif" font-weight="bold">page-about.php</text>
