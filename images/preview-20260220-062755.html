<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ふわっとカーテン表示</title>
    <style>
        /* 背景設定 */
        body {
            background-color: #5d534a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 画像のコンテナ */
        .image-container {
            width: 600px;
            max-width: 90%;
            /* 4秒ループのアニメーション設定 */
            animation: softReveal 4s linear infinite;
            
            /* === ここが「もやっと」のポイント === */
            /* 左上(135deg方向)から右下へ向かう、白から透明へのグラデーションをマスクにする */
            /* 白い部分が表示され、透明な部分は隠れる */
            /* white 20%, transparent 80% の間の広がりが「ぼかし足」になります */
            mask-image: linear-gradient(135deg, white 20%, transparent 80%);
            
            /* マスク画像を本体よりずっと大きくしておく */
            mask-size: 300% 300%;
            
            /* 繰り返さない */
            mask-repeat: no-repeat;
        }

        /* 画像自体のスタイル */
        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        /* --- マスクの位置を動かすアニメーション --- */
        @keyframes softReveal {
            /* 0%〜50%: 動画の前半（表示→消える）の動き */
            0%, 20% {
                opacity: 1;
                mask-position: 0% 0%; /* マスクの左上（白い部分）を表示 */
            }
            25%, 50% {
                opacity: 0;
                mask-position: 0% 0%;
            }

            /* 51%: 現れる直前 */
            51% {
                opacity: 1;
                /* マスクの右下（透明な部分）を画像に合わせる → 見えない状態 */
                mask-position: 100% 100%; 
            }

            /* 100%: 完了時点 */
            100% {
                opacity: 1;
                /* マスクの左上（白い部分）が画像全体を覆う位置まで移動 → 全表示 */
                /* 移動中にグラデーションの境界が通過するので「もやっと」広がる */
                mask-position: 0% 0%;
            }
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="https://images.unsplash.com/photo-1597481499750-3e6b22637e12?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="ティーグラスとピッチャー">
    </div>
</body>
</html>
