<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>配列とオブジェクト</title>
<style>
  body {
    font-family: sans-serif;
    background: #f5f7fb;
    padding: 24px;
    line-height: 1.8;
  }
  .box {
    background: #fff;
    border: 2px solid #2b6cb0;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 24px;
    margin-bottom: 20px;
  }
  .main {
    font-size: 18px;
    font-weight: bold;
    color: #2b6cb0;
  }
  .sub {
    margin-top: 8px;
    color: #333;
  }
  .note {
    background: #fffbea;
    border: 2px solid #d69e2e;
    border-radius: 12px;
    padding: 16px;
    margin-top: 24px;
  }
  code {
    background: #edf2f7;
    padding: 2px 6px;
    border-radius: 6px;
  }
</style>
</head>
<body>

<h1><code>$categories[0]->name</code> の意味</h1>

<div class="box">
  <div class="main"><code>$categories</code> → これが配列</div>
  <div class="sub">カテゴリ情報が複数入っている箱</div>
</div>

<div class="box">
  <div class="main"><code>$categories[0]</code> → これはオブジェクト</div>
  <div class="sub">配列の1件目を取り出したもの</div>
</div>

<div class="box">
  <div class="main"><code>$categories[0]->name</code> → オブジェクトの <code>name</code> プロパティの値を取る</div>
  <div class="sub"><code>イベント</code> などのカテゴリ名が入る</div>
</div>

<div class="note">
  今回は連想配列はほぼ関係ない。<br>
  今回やっているのは <strong>配列の中にオブジェクトが入っている</strong> 形。<br><br>

  連想配列ならこう書く：<br>
  <code>$data['name']</code><br><br>

  今回はこう書く：<br>
  <code>$categories[0]->name</code>
</div>

</body>
</html>
