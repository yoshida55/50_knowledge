<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg"> <!-- 背景 --> <rect width="600" height="300" fill="#f9f9f9" /> <!-- 通常の状態（縦に並ぶ） -->

<text x="20" y="30" font-family="Arial" font-size="16" font-weight="bold">1. 何もしていない状態（縦に積み重なる）</text>
<rect x="50" y="50" width="100" height="40" rx="5" fill="#ccc" />
<rect x="50" y="100" width="100" height="40" rx="5" fill="#ccc" />

<!-- display: flex （横に並ぶ） -->

<text x="320" y="30" font-family="Arial" font-size="16" font-weight="bold">2. display: flex;（横に並ぶ！）</text>
<rect x="320" y="50" width="250" height="150" rx="10" fill="none" stroke="#666" stroke-dasharray="5,5" />
<rect x="330" y="60" width="50" height="50" rx="5" fill="#ff6347" />
<rect x="390" y="60" width="50" height="50" rx="5" fill="#ff6347" />
<rect x="450" y="60" width="50" height="50" rx="5" fill="#ff6347" />
<text x="320" y="220" font-family="Arial" font-size="14" fill="#666">← 左側に詰まって並ぶ</text>

<!-- justify-content: center （中央に寄る） --> <line x1="20" y1="240" x2="580" y2="240" stroke="#ddd" stroke-width="2" /> <text x="20" y="270" font-family="Arial" font-size="16" font-weight="bold" fill="#d9534f">3. justify-content: center; （中央にぎゅっと寄る！）</text> <rect x="300" y="250" width="250" height="40" rx="10" fill="none" stroke="#d9534f" stroke-width="2" /> <rect x="345" y="255" width="30" height="30" rx="5" fill="#d9534f" /> <rect x="385" y="255" width="30" height="30" rx="5" fill="#d9534f" /> <rect x="425" y="255" width="30" height="30" rx="5" fill="#d9534f" /> <path d="M 345 275 L 305 275" stroke="#d9534f" stroke-width="2" marker-end="url(#arrow)" /> <path d="M 455 275 L 545 275" stroke="#d9534f" stroke-width="2" marker-end="url(#arrow)" /> <defs> <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth"> <path d="M0,0 L0,6 L9,3 z" fill="#d9534f" /> </marker> </defs> </svg>