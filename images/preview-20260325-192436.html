<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      .page-container {
        display: flex;
        gap: 10px;
      }

      .page-numbers {
        display: inline-flex;
        width: 40px;
        height: 40px;
        justify-content: center; /* 左右中央 */
        align-items: center;     /* 上下中央 */
        border: 1px solid #ccc;  /* 見た目用の枠線 */
        background-color: #f0f0f0; /* 見た目用の背景色 */
      }
    </style>
  </head>
  <body>
    <div class="page-container">
      <div class="page-numbers">1</div>
      <div class="page-numbers">2</div>
      <div class="page-numbers">3</div>
    </div>
  </body>
</html>
