<!doctype html>
<html lang="ja">
  <head>

  <body>

      <!-- └ ナビ（右） -->

            <a class="nav_link" href="#"><img class="nav_img" src="img/icon-instagram.png" alt="Instagram" /></a>
          </li>
        </ul>

    </header>
        <main class="main">

       Works
