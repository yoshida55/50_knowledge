<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" width="640" height="260" style="font-family:sans-serif;font-size:13px;">
  <!-- 背景 -->
  <rect width="640" height="260" fill="#f5f5f0" rx="8"/>

  <!-- タイトル -->
  <text x="320" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">flex の軸変換：2種類の違い</text>

  <!-- ===== 左：row-reverse（反転） ===== -->
  <rect x="20" y="45" width="185" height="195" fill="#fff" rx="6" stroke="#ccc"/>
  <text x="112" y="65" text-anchor="middle" font-weight="bold" fill="#444">row（通常）</text>

  <!-- boxes -->
  <rect x="35" y="75" width="40" height="30" fill="#a8d8ea" rx="4"/>
  <text x="55" y="95" text-anchor="middle" fill="#333">A</text>
  <rect x="82" y="75" width="40" height="30" fill="#a8d8ea" rx="4"/>
  <text x="102" y="95" text-anchor="middle" fill="#333">B</text>
  <rect x="129" y="75" width="40" height="30" fill="#a8d8ea" rx="4"/>
  <text x="149" y="95" text-anchor="middle" fill="#333">C</text>
  <!-- arrow -->
  <line x1="35" y1="120" x2="170" y2="120" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="102" y="135" text-anchor="middle" font-size="11" fill="#888">左 → 右</text>

  <!-- 反転ラベル -->
  <text x="112" y="158" text-anchor="middle" font-size="20" fill="#e07">⇅</text>
  <text x="112" y="175" text-anchor="middle" font-size="11" fill="#e07">反転（180°）</text>

  <text x="112" y="198" text-anchor="middle" font-weight="bold" fill="#444">row-reverse</text>
  <!-- reversed boxes -->
  <rect x="35" y="205" width="40" height="30" fill="#f4a261" rx="4"/>
  <text x="55" y="225" text-anchor="middle" fill="#fff">C</text>
  <rect x="82" y="205" width="40" height="30" fill="#f4a261" rx="4"/>
  <text x="102" y="225" text-anchor="middle" fill="#fff">B</text>
  <rect x="129" y="205" width="40" height="30" fill="#f4a261" rx="4"/>
  <text x="149" y="225" text-anchor="middle" fill="#fff">A</text>

  <!-- ===== 中：区切り ===== -->
  <line x1="320" y1="50" x2="320" y2="235" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>
  <text x="320" y="145" text-anchor="middle" font-size="22" fill="#bbb">VS</text>

  <!-- ===== 右：writing-mode（回転） ===== -->
  <rect x="435" y="45" width="185" height="195" fill="#fff" rx="6" stroke="#ccc"/>
  <text x="527" y="65" text-anchor="middle" font-weight="bold" fill="#444">row（通常）</text>

  <!-- boxes row -->
  <rect x="450" y="75" width="40" height="30" fill="#a8d8ea" rx="4"/>
  <text x="470" y="95" text-anchor="middle" fill="#333">A</text>
  <rect x="497" y="75" width="40" height="30" fill="#a8d8ea" rx="4"/>
  <text x="517" y="95" text-anchor="middle" fill="#333">B</text>
  <rect x="544" y="75" width="40" height="30" fill="#a8d8ea" rx="4"/>
  <text x="564" y="95" text-anchor="middle" fill="#333">C</text>
  <line x1="450" y1="120" x2="585" y2="120" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="517" y="135" text-anchor="middle" font-size="11" fill="#888">左 → 右</text>

  <!-- 回転ラベル -->
  <text x="527" y="158" text-anchor="middle" font-size="20" fill="#2a9d8f">↻</text>
  <text x="527" y="175" text-anchor="middle" font-size="11" fill="#2a9d8f">回転（90°）</text>

  <text x="527" y="193" text-anchor="middle" font-weight="bold" font-size="11" fill="#444">writing-mode: vertical-rl</text>
  <!-- vertical boxes -->
  <rect x="507" y="200" width="40" height="22" fill="#57cc99" rx="4"/>
  <text x="527" y="215" text-anchor="middle" fill="#fff">A</text>
  <rect x="507" y="225" width="40" height="22" fill="#57cc99" rx="4"/>
  <text x="527" y="240" text-anchor="middle" fill="#fff">B</text>

  <!-- arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>
</svg>