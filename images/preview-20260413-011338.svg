<svg width="700" height="820" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">

  <!-- ===== タイトル ===== -->
  <text x="20" y="30" font-size="16" font-weight="bold" fill="#222">1. margin-top: auto が効く仕組み（flex の直接の子のとき）</text>

  <!-- body -->
  <rect x="20" y="45" width="300" height="280" rx="6" fill="#e8f4fd" stroke="#135580" stroke-width="2"/>
  <text x="30" y="62" font-size="11" fill="#135580" font-weight="bold">body  display:flex / flex-direction:column / min-height:100vh</text>

  <!-- header -->
  <rect x="35" y="70" width="270" height="40" rx="4" fill="#135580"/>
  <text x="155" y="95" text-anchor="middle" fill="white" font-weight="bold">header</text>

  <!-- main -->
  <rect x="35" y="118" width="270" height="150" rx="4" fill="#c8e6fa" stroke="#135580" stroke-dasharray="5,3" stroke-width="1.5"/>
  <text x="155" y="135" text-anchor="middle" fill="#135580" font-size="11" font-weight="bold">main  flex:1（余白を全部使う）</text>

  <!-- 記事 -->
  <rect x="50" y="143" width="240" height="35" rx="3" fill="#fff" stroke="#aaa"/>
  <text x="170" y="165" text-anchor="middle" fill="#555">記事リスト</text>

  <!-- pagination -->
  <rect x="50" y="208" width="240" height="35" rx="3" fill="#ffd54f" stroke="#f9a825" stroke-width="1.5"/>
  <text x="170" y="230" text-anchor="middle" fill="#555" font-weight="bold">pagination　margin-top: auto ✅</text>

  <!-- 矢印（余白がautで埋まる） -->
  <line x1="170" y1="180" x2="170" y2="205" stroke="#e53935" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow_red)"/>
  <text x="175" y="197" fill="#e53935" font-size="11">余白がここに入る</text>

  <!-- footer -->
  <rect x="35" y="277" width="270" height="35" rx="4" fill="#135580"/>
  <text x="155" y="299" text-anchor="middle" fill="white" font-weight="bold">footer</text>

  <!-- OK ラベル -->
  <text x="340" y="180" fill="#2e7d32" font-size="15" font-weight="bold">✅ pagination が</text>
  <text x="340" y="200" fill="#2e7d32" font-size="15" font-weight="bold">   下に来る！</text>


  <!-- ===== 区切り ===== -->
  <line x1="20" y1="345" x2="680" y2="345" stroke="#ccc" stroke-width="1.5"/>

  <!-- ===== タイトル2 ===== -->
  <text x="20" y="375" font-size="16" font-weight="bold" fill="#222">2. 今の状態（pagination が section の中に入っているとき）</text>

  <!-- body -->
  <rect x="20" y="390" width="640" height="410" rx="6" fill="#e8f4fd" stroke="#135580" stroke-width="2"/>
  <text x="30" y="408" font-size="11" fill="#135580" font-weight="bold">body  display:flex / flex-direction:column / min-height:100vh</text>

  <!-- header -->
  <rect x="35" y="415" width="610" height="35" rx="4" fill="#135580"/>
  <text x="340" y="437" text-anchor="middle" fill="white" font-weight="bold">header</text>

  <!-- main -->
  <rect x="35" y="458" width="610" height="320" rx="4" fill="#c8e6fa" stroke="#135580" stroke-dasharray="5,3" stroke-width="1.5"/>
  <text x="340" y="474" text-anchor="middle" fill="#135580" font-size="11" font-weight="bold">main  flex:1（ここが縦いっぱいに伸びる）</text>

  <!-- section -->
  <rect x="50" y="483" width="580" height="130" rx="4" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="340" y="499" text-anchor="middle" fill="#f57f17" font-size="11" font-weight="bold">section.archive_section（flex コンテナじゃない！）</text>

  <!-- 記事 -->
  <rect x="65" y="507" width="550" height="35" rx="3" fill="#fff" stroke="#aaa"/>
  <text x="340" y="529" text-anchor="middle" fill="#555">記事リスト</text>

  <!-- pagination（中に浮いている） -->
  <rect x="65" y="550" width="550" height="35" rx="3" fill="#ffd54f" stroke="#f9a825" stroke-width="1.5"/>
  <text x="340" y="572" text-anchor="middle" fill="#555" font-weight="bold">pagination　margin-top: auto ❌（section が flex じゃないので効かない）</text>

  <!-- 大きな空白 -->
  <rect x="50" y="622" width="580" height="130" rx="4" fill="#ffebee" stroke="#e53935" stroke-dasharray="6,3" stroke-width="1.5"/>
  <text x="340" y="680" text-anchor="middle" fill="#e53935" font-size="14" font-weight="bold">😱 大きな空白（main が伸びた分）</text>
  <text x="340" y="702" text-anchor="middle" fill="#e53935" font-size="12">pagination が section の中にいるので</text>
  <text x="340" y="720" text-anchor="middle" fill="#e53935" font-size="12">ここまで押し出せない</text>

  <!-- footer -->
  <rect x="35" y="762" width="610" height="30" rx="4" fill="#135580"/>
  <text x="340" y="781" text-anchor="middle" fill="white" font-weight="bold">footer</text>

  <!-- 矢印定義 -->
  <defs>
    <marker id="arrow_red" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e53935"/>
    </marker>
  </defs>

</svg>