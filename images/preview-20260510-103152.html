<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkWorks FV Demo</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family:
        "Noto Sans JP",
        "Yu Gothic",
        "Hiragino Kaku Gothic ProN",
        sans-serif;
      color: #23483f;
      background: #fff;
    }

    img {
      max-width: 100%;
      display: block;
    }

    /* =========================
       FV
    ========================= */

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background: #dff4fb;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.96) saturate(0.95);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.08),
          rgba(255, 255, 255, 0.5)
        ),
        radial-gradient(
          circle at 50% 55%,
          rgba(255,255,255,0) 0%,
          rgba(255,255,255,0.15) 45%,
          rgba(255,255,255,0.6) 100%
        );
      pointer-events: none;
    }

    .header {
      position: absolute;
      z-index: 10;
      top: 0;
      left: 0;
      width: 100%;
      padding: 18px 6vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 24px;
      font-weight: 900;
      color: #111;
      letter-spacing: -0.04em;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 28px;
      font-weight: 700;
      color: rgba(35,72,63,0.72);
    }

    .nav a {
      color: inherit;
      text-decoration: none;
    }

    .nav .btn {
      color: #fff;
      background: #2f6f5e;
      padding: 14px 26px;
      border-radius: 999px;
      box-shadow: 0 10px 25px rgba(47,111,94,0.22);
    }

    .nav .btn-light {
      color: #fff;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: none;
    }

    .menu-btn {
      width: 54px;
      height: 54px;
      border-radius: 10px;
      border: 1px solid rgba(35,72,63,0.15);
      background: rgba(255,255,255,0.25);
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .menu-btn span,
    .menu-btn span::before,
    .menu-btn span::after {
      content: "";
      display: block;
      width: 26px;
      height: 2px;
      background: #23483f;
      border-radius: 999px;
    }

    .menu-btn span::before {
      transform: translateY(-8px);
    }

    .menu-btn span::after {
      transform: translateY(6px);
    }

    .hero-content {
      position: relative;
      z-index: 4;
      min-height: 100vh;
      padding: 92px 7vw 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
    }

    .hero-label {
      position: absolute;
      top: 78px;
      left: 7vw;
      background: #2f6f5e;
      color: #fff;
      padding: 14px 22px;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.12em;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    }

    .vertical-copy {
      display: flex;
      align-items: flex-start;
      gap: 22px;
      margin-top: 40px;
    }

    .vertical-copy span {
      writing-mode: vertical-rl;
      background: rgba(255,255,255,0.88);
      color: #2f6f5e;
      padding: 30px 18px;
      border-radius: 8px;
      font-size: clamp(38px, 4vw, 62px);
      font-weight: 900;
      line-height: 1.32;
      letter-spacing: 0.08em;
      box-shadow: 0 16px 36px rgba(0,0,0,0.1);
      backdrop-filter: blur(5px);
    }

    .hero-message {
      align-self: flex-end;
      margin-bottom: 110px;
      max-width: 520px;
      text-align: right;
      color: #fff;
      font-size: clamp(19px, 2vw, 28px);
      font-weight: 900;
      line-height: 2;
      text-shadow: 0 4px 16px rgba(0,0,0,0.34);
      letter-spacing: 0.08em;
    }

    .hero-tabs {
      position: absolute;
      z-index: 6;
      left: 50%;
      bottom: 54px;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
    }

    .hero-tab {
      border: 1px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.28);
      color: rgba(255,255,255,0.9);
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 800;
      backdrop-filter: blur(5px);
    }

    .hero-tab.active {
      background: #fff;
      color: #2f6f5e;
    }

    .scroll-arrow {
      position: absolute;
      z-index: 7;
      right: 7vw;
      bottom: 58px;
      color: #fff;
      font-size: 11px;
      letter-spacing: 0.45em;
      text-align: center;
      text-shadow: 0 2px 10px rgba(0,0,0,0.24);
    }

    .scroll-arrow::after {
      content: "";
      display: block;
      width: 1px;
      height: 68px;
      margin: 16px auto 0;
      background: rgba(255,255,255,0.9);
      animation: scrollLine 1.6s ease-in-out infinite;
    }

    @keyframes scrollLine {
      0% {
        transform: scaleY(0.4);
        transform-origin: top;
        opacity: 0.4;
      }
      50% {
        transform: scaleY(1);
        opacity: 1;
      }
      100% {
        transform: scaleY(0.4);
        transform-origin: bottom;
        opacity: 0.4;
      }
    }

    /* =========================
       つなぎ
    ========================= */

    .bridge {
      position: relative;
      z-index: 20;
      margin-top: -120px;
      background: transparent;
      pointer-events: none;
    }

    .bridge svg {
      width: 100%;
      height: 150px;
      display: block;
    }

    .bridge-inner {
      background: #fff;
      padding: 20px 7vw 30px;
      text-align: center;
      pointer-events: auto;
    }

    .bridge-note {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto;
      background: #eaf7f4;
      color: #2f6f5e;
      padding: 12px 26px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .bridge-note::before,
    .bridge-note::after {
      content: "";
      width: 28px;
      height: 2px;
      background: #78BEE6;
      border-radius: 999px;
    }

    .hand-arrow {
      width: 82px;
      margin: 18px auto 0;
      opacity: 0.9;
      animation: floatArrow 1.8s ease-in-out infinite;
    }

    @keyframes floatArrow {
      0%, 100% {
        transform: translateY(-4px);
      }
      50% {
        transform: translateY(6px);
      }
    }

    /* =========================
       写真セクション
    ========================= */

    .real-section {
      background:
        radial-gradient(circle at 10% 10%, rgba(120,190,230,0.15), transparent 28%),
        #fff;
      padding: 50px 7vw 110px;
    }

    .section-title {
      text-align: center;
      margin-bottom: 48px;
    }

    .section-title span {
      display: block;
      color: #78BEE6;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.18em;
      margin-bottom: 8px;
    }

    .section-title h2 {
      margin: 0;
      color: #2f6f5e;
      font-size: clamp(30px, 4vw, 48px);
      letter-spacing: 0.06em;
    }

    .work-cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 34px;
      max-width: 1120px;
      margin: 0 auto;
    }

    .work-card {
      overflow: hidden;
      border-radius: 26px;
      background: #fff;
      box-shadow: 0 20px 50px rgba(0,0,0,0.09);
      transform: translateY(20px);
      opacity: 0;
      transition: 0.7s ease;
    }

    .work-card.show {
      transform: translateY(0);
      opacity: 1;
    }

    .work-card-img {
      height: 280px;
      overflow: hidden;
      background: #eaf7f4;
    }

    .work-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .work-card-body {
      padding: 30px;
    }

    .work-number {
      display: inline-block;
      color: #78BEE6;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.16em;
      margin-bottom: 8px;
    }

    .work-card h3 {
      margin: 0 0 12px;
      color: #2f6f5e;
      font-size: 28px;
      letter-spacing: 0.05em;
    }

    .work-card p {
      margin: 0;
      color: #555;
      line-height: 1.9;
      font-size: 15.5px;
    }

    /* =========================
       スマホ
    ========================= */

    @media (max-width: 900px) {
      .nav a:not(.btn) {
        display: none;
      }

      .nav .btn-light {
        display: none;
      }

      .hero-content {
        align-items: flex-start;
        flex-direction: column;
        justify-content: center;
      }

      .vertical-copy {
        gap: 14px;
      }

      .vertical-copy span {
        font-size: 38px;
        padding: 24px 14px;
      }

      .hero-message {
        align-self: flex-start;
        text-align: left;
        margin-bottom: 70px;
        font-size: 18px;
      }

      .hero-tabs {
        bottom: 28px;
      }

      .scroll-arrow {
        display: none;
      }

      .work-cards {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .header {
        padding: 14px 5vw;
      }

      .logo {
        font-size: 20px;
      }

      .nav .btn {
        display: none;
      }

      .hero-label {
        left: 5vw;
        top: 72px;
        font-size: 13px;
      }

      .hero-content {
        padding: 92px 5vw 90px;
      }

      .vertical-copy span {
        font-size: 32px;
      }

      .bridge {
        margin-top: -80px;
      }

      .bridge svg {
        height: 100px;
      }

      .bridge-note {
        font-size: 13px;
        padding: 10px 18px;
      }

      .work-card-img {
        height: 220px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <header class="header">
      <div class="logo">LinkWorks</div>

      <nav class="nav">
        <a href="#">事業内容</a>
        <a href="#">会社概要</a>
        <a href="#" class="btn btn-light">ご利用を考えている方へ →</a>
        <a href="#" class="btn">企業のご担当者様へ →</a>
        <button class="menu-btn" aria-label="メニュー">
          <span></span>
        </button>
      </nav>
    </header>

    <div class="hero-bg">
      <!-- ここを自分のFV画像に変更 -->
      <img src="fv-illustration.jpg" alt="就労継続支援事業所のイメージ">
    </div>

    <div class="hero-content">
      <p class="hero-label">就労継続支援事業所</p>

      <div class="vertical-copy">
        <span>一人ひとりの力を、</span>
        <span>確かな仕事へ。</span>
      </div>

      <p class="hero-message">
        軽作業・IT業務を通じて、<br>
        あなたの「できる」を育てます。
      </p>
    </div>

    <div class="hero-tabs">
      <button class="hero-tab active">01 軽作業</button>
      <button class="hero-tab">02 IT業務</button>
    </div>

    <div class="scroll-arrow">SCROLL</div>
  </section>

  <!-- アニメFVから写真へ自然につなぐ部分 -->
  <div class="bridge">
    <svg viewBox="0 0 1440 150" preserveAspectRatio="none">
      <path
        d="M0,70 C220,135 420,20 665,75 C920,132 1130,30 1440,85 L1440,150 L0,150 Z"
        fill="#ffffff"
      />
    </svg>

    <div class="bridge-inner">
      <p class="bridge-note">ここからは、実際のしごとの雰囲気をご紹介します</p>

      <div class="hand-arrow">
        <svg viewBox="0 0 120 120" fill="none">
          <path
            d="M56 7 C72 24 75 45 64 56 C52 69 27 62 31 45 C34 30 61 30 65 52 C68 72 48 88 42 105"
            stroke="#78BEE6"
            stroke-width="5.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M42 105 C48 101 54 98 60 94 M42 105 C44 98 46 91 49 85"
            stroke="#78BEE6"
            stroke-width="5.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>
    </div>
  </div>

  <section class="real-section">
    <div class="section-title">
      <span>WORKS</span>
      <h2>事業所でできること</h2>
    </div>

    <div class="work-cards">
      <article class="work-card">
        <div class="work-card-img">
          <!-- 顔なし・手元・作業風景の写真に差し替え -->
          <img src="work-light.jpg" alt="軽作業の様子">
        </div>
        <div class="work-card-body">
          <span class="work-number">01</span>
          <h3>軽作業</h3>
          <p>
            箱折り、封入、ラベル貼り、検品など、
            落ち着いて取り組める作業を用意しています。
          </p>
        </div>
      </article>

      <article class="work-card">
        <div class="work-card-img">
          <!-- 顔なし・手元・PC作業風景の写真に差し替え -->
          <img src="work-it.jpg" alt="IT業務の様子">
        </div>
        <div class="work-card-body">
          <span class="work-number">02</span>
          <h3>IT業務</h3>
          <p>
            パソコン入力やWeb制作など、
            得意なことを活かしながら少しずつ経験できます。
          </p>
        </div>
      </article>
    </div>
  </section>

  <script>
    const cards = document.querySelectorAll(".work-card");

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("show");
        }
      });
    }, {
      threshold: 0.2
    });

    cards.forEach((card) => observer.observe(card));
  </script>

</body>
</html>
