<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#fdfaf5" />
  
  <rect x="0" y="0" width="800" height="40" fill="#1a1a1a" />
  <rect x="15" y="12" width="15" height="15" stroke="#ff8c00" stroke-width="2" fill="none" />
  <text x="35" y="25" fill="#ff8c00" font-family="sans-serif" font-size="12">relative</text>
  
  <rect x="110" y="12" width="15" height="15" stroke="#007bff" stroke-width="2" fill="none" />
  <text x="130" y="25" fill="#007bff" font-family="sans-serif" font-size="12">flex (row/center)</text>
  
  <rect x="250" y="12" width="15" height="15" stroke="#28a745" stroke-width="2" stroke-dasharray="4" fill="none" />
  <text x="270" y="25" fill="#28a745" font-family="sans-serif" font-size="12">grid (2 columns)</text>

  <rect x="20" y="60" width="760" height="520" rx="10" stroke="#ff8c00" stroke-width="2" fill="none" />
  <text x="30" y="75" fill="#ff8c00" font-family="monospace" font-size="10">section [position: relative] padding: 80px 0</text>

  <rect x="40" y="100" width="720" height="460" stroke="#28a745" stroke-width="2" stroke-dasharray="5,5" fill="none" />
  <text x="50" y="115" fill="#28a745" font-family="monospace" font-size="10">div [display: grid] grid-template-columns: 1fr 1fr; gap: 60px;</text>

  <g>
    <text x="50" y="145" fill="#5d4037" font-family="serif" font-size="12">Information</text>
    <text x="50" y="175" fill="#5d4037" font-family="serif" font-size="24" font-weight="bold">お知らせ</text>
    
    <rect x="50" y="200" width="320" height="80" stroke="#ccc" stroke-width="1" fill="#fff" opacity="0.5" />
    <rect x="50" y="200" width="100" height="80" fill="#efebe9" />
    <text x="160" y="225" fill="#888" font-size="10">お知らせ | 2025/11/11</text>
    <text x="160" y="245" fill="#333" font-size="12">ブログ更新のお知らせ</text>
    
    <line x1="50" y1="280" x2="370" y2="280" stroke="#eee" />
    <line x1="50" y1="360" x2="370" y2="360" stroke="#eee" />
    
    <rect x="280" y="520" width="90" height="30" rx="15" stroke="#333" stroke-width="1" fill="none" />
    <text x="305" y="540" fill="#333" font-size="10">一覧を見る</text>
  </g>

  <g>
    <text x="410" y="145" fill="#5d4037" font-family="serif" font-size="12">Blog</text>
    <text x="410" y="175" fill="#5d4037" font-family="serif" font-size="24" font-weight="bold">ブログ</text>
    
    <rect x="410" y="200" width="320" height="80" stroke="#007bff" stroke-width="1" fill="none" />
    <text x="415" y="195" fill="#007bff" font-family="monospace" font-size="9">display: flex; align-items: center;</text>
    
    <rect x="410" y="200" width="100" height="70" fill="#ddd" />
    <line x1="410" y1="200" x2="510" y2="270" stroke="#bbb" />
    <line x1="510" y1="200" x2="410" y2="270" stroke="#bbb" />
    
    <text x="520" y="225" fill="#888" font-size="10">地鎮祭 | 2026/02/14</text>
    <text x="520" y="245" fill="#333" font-size="12" font-weight="bold">【地鎮祭】IN様邸</text>
    
    <rect x="640" y="520" width="90" height="30" rx="15" stroke="#333" stroke-width="1" fill="none" />
    <text x="665" y="540" fill="#333" font-size="10">一覧を見る</text>
  </g>
  
  <line x1="400" y1="120" x2="400" y2="500" stroke="#eee" stroke-width="1" />
</svg>