<svg width="1000" height="650" viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg" style="background-color: #f6f4f0;">
  <rect x="0" y="0" width="1000" height="40" fill="#222" />
  
  <rect x="20" y="10" width="20" height="20" stroke="#ff8c00" stroke-width="2" fill="none" />
  <text x="50" y="25" fill="#ff8c00" font-family="sans-serif" font-weight="bold" font-size="14">flex (row : 横並び)</text>

  <rect x="220" y="10" width="20" height="20" stroke="#007bff" stroke-width="2" fill="none" />
  <text x="250" y="25" fill="#007bff" font-family="sans-serif" font-weight="bold" font-size="14">flex (column : 縦並び)</text>

  <rect x="440" y="10" width="20" height="20" stroke="#28a745" stroke-width="2" stroke-dasharray="5,5" fill="none" />
  <text x="470" y="25" fill="#28a745" font-family="sans-serif" font-weight="bold" font-size="14">grid (全体カラム分割)</text>

  <rect x="30" y="60" width="940" height="560" stroke="#28a745" stroke-width="3" stroke-dasharray="8,8" fill="none" />
  <text x="40" y="80" fill="#28a745" font-family="monospace" font-weight="bold" font-size="12">section [display: grid; grid-template-columns: 1fr 1fr; gap: 60px;]</text>

  <line x1="500" y1="100" x2="500" y2="600" stroke="#ddd" stroke-width="2" />

  <g transform="translate(50, 100)">
    <text x="0" y="15" fill="#6a5242" font-family="serif" font-size="12">Information</text>
    <text x="0" y="45" fill="#6a5242" font-family="serif" font-size="28" font-weight="bold">お知らせ</text>

    <rect x="0" y="70" width="410" height="420" stroke="#007bff" stroke-width="1.5" stroke-dasharray="3,3" fill="none" />
    <text x="5" y="85" fill="#007bff" font-family="monospace" font-size="10">div [display: flex; flex-direction: column; gap: 0;]</text>

    <rect x="0" y="100" width="410" height="90" stroke="#ff8c00" stroke-width="1.5" fill="#fff" fill-opacity="0.5" />
    <text x="5" y="115" fill="#ff8c00" font-family="monospace" font-size="10">article [display: flex; align-items: center; border-bottom: 1px solid #eee;]</text>
    
    <rect x="0" y="125" width="120" height="60" fill="#eae6e0" /> <text x="60" y="158" fill="#888" font-family="sans-serif" font-size="10" text-anchor="middle">Image / bg</text>
    <text x="140" y="145" fill="#888" font-family="sans-serif" font-size="11">お知らせ ｜ 2025/11/11</text>
    <text x="140" y="170" fill="#333" font-family="sans-serif" font-size="14" font-weight="bold">ブログ更新のお知らせ</text>

    <rect x="0" y="210" width="410" height="90" stroke="#ff8c00" stroke-width="1.5" fill="#fff" fill-opacity="0.5" />
    <rect x="0" y="235" width="120" height="60" fill="#eae6e0" />
    <text x="60" y="268" fill="#888" font-family="sans-serif" font-size="10" text-anchor="middle">Image / bg</text>
    <text x="140" y="255" fill="#888" font-family="sans-serif" font-size="11">お知らせ ｜ 2025/10/23</text>
    <text x="140" y="280" fill="#333" font-family="sans-serif" font-size="14" font-weight="bold">ホームページリニューアルのお知らせ</text>

    <rect x="0" y="320" width="410" height="90" stroke="#ff8c00" stroke-width="1.5" fill="#fff" fill-opacity="0.5" />
    <rect x="0" y="345" width="120" height="60" fill="#eae6e0" />
    <text x="60" y="378" fill="#888" font-family="sans-serif" font-size="10" text-anchor="middle">Image / bg</text>
    <text x="140" y="365" fill="#888" font-family="sans-serif" font-size="11">お知らせ ｜ 2025/10/02</text>
    <text x="140" y="390" fill="#333" font-family="sans-serif" font-size="14" font-weight="bold">【熊本・福岡】新モデルハウス、来年...</text>

    <rect x="310" y="440" width="100" height="30" rx="15" stroke="#ccc" stroke-width="1" fill="none" />
    <text x="360" y="460" fill="#333" font-family="sans-serif" font-size="12" text-anchor="middle">→ 一覧を見る</text>
    <text x="310" y="435" fill="#ff8c00" font-family="monospace" font-size="10">a [margin-left: auto;]</text>
  </g>

  <g transform="translate(540, 100)">
    <text x="0" y="15" fill="#6a5242" font-family="serif" font-size="12">Blog</text>
    <text x="0" y="45" fill="#6a5242" font-family="serif" font-size="28" font-weight="bold">ブログ</text>

    <rect x="0" y="70" width="410" height="420" stroke="#007bff" stroke-width="1.5" stroke-dasharray="3,3" fill="none" />

    <rect x="0" y="100" width="410" height="90" stroke="#ff8c00" stroke-width="1.5" fill="#fff" fill-opacity="0.5" />
    <rect x="0" y="115" width="130" height="70" fill="#d9edf7" />
    <text x="0" y="110" fill="#007bff" font-family="monospace" font-size="9">img [aspect-ratio: 16/9; object-fit: cover;]</text>
    <text x="65" y="155" fill="#007bff" font-family="sans-serif" font-size="10" text-anchor="middle">Photo</text>
    <text x="150" y="145" fill="#888" font-family="sans-serif" font-size="11">地鎮祭 ｜ 2026/02/14</text>
    <text x="150" y="170" fill="#333" font-family="sans-serif" font-size="14" font-weight="bold">【地鎮祭】IN様邸</text>

    <rect x="0" y="210" width="410" height="90" stroke="#ff8c00" stroke-width="1.5" fill="#fff" fill-opacity="0.5" />
    <rect x="0" y="225" width="130" height="70" fill="#d9edf7" />
    <text x="65" y="265" fill="#007bff" font-family="sans-serif" font-size="10" text-anchor="middle">Photo</text>
    <text x="150" y="255" fill="#888" font-family="sans-serif" font-size="11">上棟 ｜ 2026/02/11</text>
    <text x="150" y="280" fill="#333" font-family="sans-serif" font-size="14" font-weight="bold">【上棟式】久留米モデルハウス</text>

    <rect x="0" y="320" width="410" height="90" stroke="#ff8c00" stroke-width="1.5" fill="#fff" fill-opacity="0.5" />
    <rect x="0" y="335" width="130" height="70" fill="#d9edf7" />
    <text x="65" y="375" fill="#007bff" font-family="sans-serif" font-size="10" text-anchor="middle">Photo</text>
    <text x="150" y="365" fill="#888" font-family="sans-serif" font-size="11">お引渡し ｜ 2026/02/10</text>
    <text x="150" y="390" fill="#333" font-family="sans-serif" font-size="14" font-weight="bold">【引き渡し】FK様邸</text>

    <rect x="310" y="440" width="100" height="30" rx="15" stroke="#ccc" stroke-width="1" fill="none" />
    <text x="360" y="460" fill="#333" font-family="sans-serif" font-size="12" text-anchor="middle">→ 一覧を見る</text>
  </g>
</svg>