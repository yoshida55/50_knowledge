<svg width="400" height="220" xmlns="http://www.w3.org/2000/svg">
  <!-- グループA (z-index: 1) -->
  <rect x="20" y="30" width="200" height="160" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="30" y="52" font-size="12" fill="#1d4ed8">.box-a ( z-index: 1 )</text>

  <!-- child (z-index: 9999 だがグループA内だけ有効) -->
  <rect x="50" y="70" width="140" height="80" fill="#93c5fd" stroke="#2563eb" stroke-width="2"/>
  <text x="70" y="105" font-size="11" fill="#1e3a8a">.child</text>
  <text x="70" y="122" font-size="10" fill="#1e3a8a">z-index: 9999</text>

  <!-- グループB (z-index: 2) → box-a全体より上なので childに重なって勝つ -->
  <rect x="150" y="60" width="200" height="120" fill="#fef08a" stroke="#ca8a04" stroke-width="2" opacity="0.92"/>
  <text x="160" y="85" font-size="12" fill="#854d0e">.box-b ( z-index: 2 )</text>
  <text x="160" y="108" font-size="10" fill="#854d0e">グループAより上</text>
  <text x="160" y="124" font-size="10" fill="#854d0e">→ child の 9999 に勝てる</text>
</svg>