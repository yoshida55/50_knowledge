<svg width="420" height="520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif"> <!-- 背景 --> <rect width="420" height="520" fill="#f8f9fa" rx="12"/> <!-- タイトル -->
<text x="210" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">画面の一番下に要素を置く仕組み</text>

<!-- 親コンテナ (height: 100vh イメージ) --> <rect x="60" y="60" width="200" height="400" fill="#fff" stroke="#4a90d9" stroke-width="2.5" rx="6"/> <text x="160" y="54" text-anchor="middle" font-size="11" fill="#4a90d9" font-weight="bold">親要素</text> <text x="160" y="68" text-anchor="middle" font-size="10" fill="#4a90d9">display: flex / flex-direction: column</text> <text x="160" y="480" text-anchor="middle" font-size="10" fill="#4a90d9">height: 100vh</text> <!-- 子要素A --> <rect x="80" y="78" width="160" height="44" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="4"/> <text x="160" y="97" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="bold">子要素 A</text> <text x="160" y="113" text-anchor="middle" font-size="10" fill="#3b82f6">コンテンツ</text> <!-- 子要素B --> <rect x="80" y="130" width="160" height="44" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5" rx="4"/> <text x="160" y="149" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="bold">子要素 B</text> <text x="160" y="165" text-anchor="middle" font-size="10" fill="#3b82f6">コンテンツ</text> <!-- 隙間エリア --> <rect x="80" y="182" width="160" height="196" fill="#fef9c3" stroke="#fde047" stroke-width="1.5" stroke-dasharray="6,4" rx="4"/> <text x="160" y="262" text-anchor="middle" font-size="13" fill="#a16207" font-weight="bold">余った隙間</text> <text x="160" y="280" text-anchor="middle" font-size="10" fill="#a16207">（free space）</text> <text x="160" y="300" text-anchor="middle" font-size="10" fill="#d97706">margin-top: auto が</text> <text x="160" y="316" text-anchor="middle" font-size="10" fill="#d97706">ここを全部食べる</text> <!-- 矢印（margin-top: auto が下に押す） --> <line x1="160" y1="330" x2="160" y2="368" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/> <defs> <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"> <path d="M0,0 L0,8 L8,4 Z" fill="#f59e0b"/> </marker> </defs> <!-- 最後の子要素（一番下） --> <rect x="80" y="378" width="160" height="44" fill="#dcfce7" stroke="#86efac" stroke-width="1.5" rx="4"/> <text x="160" y="396" text-anchor="middle" font-size="12" fill="#166534" font-weight="bold">最後の子要素</text> <text x="160" y="412" text-anchor="middle" font-size="10" fill="#16a34a">margin-top: auto</text> <!-- 右側の説明 --> <!-- ステップ1 -->
<text x="290" y="100" font-size="11" font-weight="bold" fill="#1e40af">① 親に高さを与える</text>
<text x="290" y="116" font-size="10" fill="#3b82f6">height: 100vh</text>
<line x1="242" y1="100" x2="285" y2="100" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3"/>

<!-- ステップ2 -->
<text x="290" y="220" font-size="11" font-weight="bold" fill="#a16207">② Flexboxで</text>
<text x="290" y="236" font-size="10" fill="#d97706">隙間を「認識」させる</text>
<text x="290" y="250" font-size="10" fill="#d97706">（通常blockでは0扱い）</text>
<line x1="242" y1="280" x2="285" y2="250" stroke="#fde047" stroke-width="1.5" stroke-dasharray="4,3"/>

<!-- ステップ3 -->
<text x="290" y="396" font-size="11" font-weight="bold" fill="#166534">③ 一番下に到達！</text>
<text x="290" y="412" font-size="10" fill="#16a34a">隙間を全消費して</text>
<text x="290" y="426" font-size="10" fill="#16a34a">押し出された状態</text>
<line x1="242" y1="400" x2="285" y2="400" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4,3"/>

</svg>