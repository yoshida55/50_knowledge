<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320" style="font-family: monospace; background: #1e1e1e; border-radius: 12px;"> <!-- タイトル -->
<text x="300" y="36" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">get_term_link vs get_category_link</text>

<!-- 左ボックス：get_term_link --> <rect x="30" y="56" width="250" height="230" rx="10" fill="#2a3a4a" stroke="#4a9eff" stroke-width="2"/> <text x="155" y="82" text-anchor="middle" fill="#4a9eff" font-size="13" font-weight="bold">get_term_link()</text>
<text x="50" y="112" fill="#aaaaaa" font-size="11">引数①</text>
<rect x="50" y="120" width="210" height="28" rx="6" fill="#1a2a3a"/>
<text x="155" y="139" text-anchor="middle" fill="#f0c674" font-size="12">'news'（スラッグ・文字列）</text>

<text x="50" y="168" fill="#aaaaaa" font-size="11">引数②</text>
<rect x="50" y="176" width="210" height="28" rx="6" fill="#1a2a3a"/>
<text x="155" y="195" text-anchor="middle" fill="#f0c674" font-size="12">'category' or 'post_tag'</text>

<line x1="50" y1="220" x2="260" y2="220" stroke="#444" stroke-width="1"/>
<text x="155" y="242" text-anchor="middle" fill="#98c379" font-size="11">✅ カテゴリー</text>
<text x="155" y="260" text-anchor="middle" fill="#98c379" font-size="11">✅ タグ（post_tag）</text>
<text x="155" y="278" text-anchor="middle" fill="#98c379" font-size="11">✅ カスタムタクソノミー</text>

<!-- 右ボックス：get_category_link --> <rect x="320" y="56" width="250" height="230" rx="10" fill="#3a2a2a" stroke="#e06c75" stroke-width="2"/> <text x="445" y="82" text-anchor="middle" fill="#e06c75" font-size="13" font-weight="bold">get_category_link()</text>
<text x="340" y="112" fill="#aaaaaa" font-size="11">引数①</text>
<rect x="340" y="120" width="210" height="28" rx="6" fill="#2a1a1a"/>
<text x="445" y="139" text-anchor="middle" fill="#f0c674" font-size="12">5（カテゴリーID・数字）</text>

<text x="340" y="168" fill="#aaaaaa" font-size="11">引数②</text>
<rect x="340" y="176" width="210" height="28" rx="6" fill="#2a1a1a"/>
<text x="445" y="195" text-anchor="middle" fill="#888888" font-size="12">なし</text>

<line x1="340" y1="220" x2="550" y2="220" stroke="#444" stroke-width="1"/>
<text x="445" y="242" text-anchor="middle" fill="#98c379" font-size="11">✅ カテゴリー</text>
<text x="445" y="260" text-anchor="middle" fill="#e06c75" font-size="11">❌ タグは使えない</text>
<text x="445" y="278" text-anchor="middle" fill="#e06c75" font-size="11">❌ カスタムタクソノミー不可</text>

</svg>