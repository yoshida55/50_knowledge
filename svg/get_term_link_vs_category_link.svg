<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" style="font-family: monospace; background: #1e1e1e; border-radius: 12px;"> <!-- タイトル -->
<text x="320" y="34" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold">get_term_link vs get_category_link</text>

<!-- 左ボックス --> <rect x="20" y="50" width="290" height="350" rx="10" fill="#2a3a4a" stroke="#4a9eff" stroke-width="2"/> <text x="165" y="76" text-anchor="middle" fill="#4a9eff" font-size="13" font-weight="bold">get_term_link()</text> <!-- 引数 -->
<text x="38" y="100" fill="#aaaaaa" font-size="11">引数①　スラッグ（文字列）</text>
<rect x="38" y="106" width="254" height="24" rx="5" fill="#1a2a3a"/>
<text x="165" y="123" text-anchor="middle" fill="#f0c674" font-size="11">'news'</text>

<text x="38" y="146" fill="#aaaaaa" font-size="11">引数②　タクソノミー種類</text>
<rect x="38" y="152" width="254" height="24" rx="5" fill="#1a2a3a"/>
<text x="165" y="169" text-anchor="middle" fill="#f0c674" font-size="11">'category'　or　'post_tag'</text>

<!-- 対応範囲 --> <line x1="38" y1="188" x2="292" y2="188" stroke="#444" stroke-width="1"/> <text x="165" y="206" text-anchor="middle" fill="#98c379" font-size="11">✅ カテゴリー / タグ / カスタムタクソノミー</text> <!-- 戻り値 --> <line x1="38" y1="220" x2="292" y2="220" stroke="#444" stroke-width="1"/> <text x="38" y="238" fill="#aaaaaa" font-size="11">戻り値（返ってくる値）</text> <rect x="38" y="244" width="254" height="22" rx="5" fill="#1a2a3a"/> <text x="165" y="260" text-anchor="middle" fill="#61afef" font-size="10">/category/news/　のURL文字列</text> <rect x="38" y="272" width="254" height="22" rx="5" fill="#1a2a3a"/> <text x="165" y="288" text-anchor="middle" fill="#61afef" font-size="10">/tag/wordpress/　のURL文字列</text> <!-- どんなページ --> <line x1="38" y1="306" x2="292" y2="306" stroke="#444" stroke-width="1"/> <text x="38" y="324" fill="#aaaaaa" font-size="11">どんなページ？</text> <text x="165" y="342" text-anchor="middle" fill="#ffffff" font-size="11">そのカテゴリー or タグの</text> <text x="165" y="360" text-anchor="middle" fill="#ffffff" font-size="11">📋 記事一覧ページ</text> <text x="165" y="382" text-anchor="middle" fill="#888" font-size="10">（URLを返すだけ・表示はしない）</text> <!-- 右ボックス --> <rect x="330" y="50" width="290" height="350" rx="10" fill="#3a2a2a" stroke="#e06c75" stroke-width="2"/> <text x="475" y="76" text-anchor="middle" fill="#e06c75" font-size="13" font-weight="bold">get_category_link()</text> <!-- 引数 -->
<text x="348" y="100" fill="#aaaaaa" font-size="11">引数①　カテゴリーID（数字）</text>
<rect x="348" y="106" width="254" height="24" rx="5" fill="#2a1a1a"/>
<text x="475" y="123" text-anchor="middle" fill="#f0c674" font-size="11">5</text>

<text x="348" y="146" fill="#aaaaaa" font-size="11">引数②</text>
<rect x="348" y="152" width="254" height="24" rx="5" fill="#2a1a1a"/>
<text x="475" y="169" text-anchor="middle" fill="#666666" font-size="11">なし</text>

<!-- 対応範囲 --> <line x1="348" y1="188" x2="602" y2="188" stroke="#444" stroke-width="1"/> <text x="475" y="206" text-anchor="middle" fill="#e06c75" font-size="11">✅ カテゴリーのみ　❌ タグ不可</text> <!-- 戻り値 --> <line x1="348" y1="220" x2="602" y2="220" stroke="#444" stroke-width="1"/> <text x="348" y="238" fill="#aaaaaa" font-size="11">戻り値（返ってくる値）</text> <rect x="348" y="244" width="254" height="22" rx="5" fill="#2a1a1a"/> <text x="475" y="260" text-anchor="middle" fill="#61afef" font-size="10">/category/news/　のURL文字列</text> <rect x="348" y="272" width="254" height="22" rx="5" fill="#333"/> <text x="475" y="288" text-anchor="middle" fill="#666" font-size="10">（タグのURLは取得できない）</text> <!-- どんなページ --> <line x1="348" y1="306" x2="602" y2="306" stroke="#444" stroke-width="1"/> <text x="348" y="324" fill="#aaaaaa" font-size="11">どんなページ？</text> <text x="475" y="342" text-anchor="middle" fill="#ffffff" font-size="11">そのカテゴリーIDの</text> <text x="475" y="360" text-anchor="middle" fill="#ffffff" font-size="11">📋 記事一覧ページ</text> <text x="475" y="382" text-anchor="middle" fill="#888" font-size="10">（URLを返すだけ・表示はしない）</text> </svg>
