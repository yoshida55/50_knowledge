<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 950" font-family="'Segoe UI', sans-serif">
  <rect width="1100" height="950" fill="#fafafa"/>

  <defs>
    <marker id="arrR" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/></marker>
    <marker id="arrO" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#e67e22"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3498db"/></marker>
    <marker id="arrP" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#8e44ad"/></marker>
    <marker id="arrK" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#555"/></marker>
  </defs>

  <!-- Title -->
  <text x="550" y="32" font-size="22" font-weight="bold" text-anchor="middle" fill="#222">スキル群の全体像 - どのスキルが何を流すか</text>
  <text x="550" y="58" font-size="12" text-anchor="middle" fill="#666">6スキル（pc-init / setup-project / work-start / work-end / sync-home-start / sync-home-end）</text>

  <!-- ===== 4 Location boxes ===== -->
  <!-- RESTART (top-left) -->
  <rect x="40" y="90" width="280" height="180" fill="#fff" stroke="#c0392b" stroke-width="2.5" rx="10"/>
  <text x="180" y="120" font-size="16" font-weight="bold" text-anchor="middle" fill="#c0392b">🌐 RESTART</text>
  <text x="180" y="138" font-size="11" text-anchor="middle" fill="#888">（提出先・公式リポ）</text>
  <line x1="60" y1="148" x2="300" y2="148" stroke="#eee"/>
  <text x="180" y="170" font-size="13" text-anchor="middle">main: ALLA（マージ後の統合）</text>
  <text x="180" y="190" font-size="13" text-anchor="middle">takahashi: 自分の作業</text>
  <text x="180" y="210" font-size="13" text-anchor="middle">yamada / satou: 他メンバー</text>
  <text x="180" y="245" font-size="11" text-anchor="middle" fill="#c0392b" font-weight="bold">⚠ main 宛 push は hook で拒否</text>

  <!-- origin (top-right) -->
  <rect x="780" y="90" width="280" height="180" fill="#fff" stroke="#8e44ad" stroke-width="2.5" rx="10"/>
  <text x="920" y="120" font-size="16" font-weight="bold" text-anchor="middle" fill="#8e44ad">💾 origin (自分のGitHub)</text>
  <text x="920" y="138" font-size="11" text-anchor="middle" fill="#888">（自分専用バックアップ）</text>
  <line x1="800" y1="148" x2="1040" y2="148" stroke="#eee"/>
  <text x="920" y="180" font-size="13" text-anchor="middle">main: 常に最新の作業状態</text>
  <text x="920" y="205" font-size="11" text-anchor="middle" fill="#888">（squash済み + 家の差分が追加）</text>
  <text x="920" y="245" font-size="11" text-anchor="middle" fill="#8e44ad" font-weight="bold">🔒 必ず Private にする</text>

  <!-- 会社PC (bottom-left) -->
  <rect x="40" y="450" width="280" height="220" fill="#fff" stroke="#27ae60" stroke-width="2.5" rx="10"/>
  <text x="180" y="480" font-size="16" font-weight="bold" text-anchor="middle" fill="#27ae60">🏢 会社PC</text>
  <line x1="60" y1="490" x2="300" y2="490" stroke="#eee"/>
  <text x="180" y="513" font-size="12" text-anchor="middle" fill="#333">初回: /setup-project (c)</text>
  <text x="180" y="535" font-size="12" text-anchor="middle" fill="#333">朝: /work-start</text>
  <text x="180" y="557" font-size="12" text-anchor="middle" fill="#333">夕方: /work-end</text>
  <line x1="60" y1="572" x2="300" y2="572" stroke="#eee"/>
  <text x="180" y="595" font-size="11" text-anchor="middle" fill="#666">local takahashi で作業</text>
  <text x="180" y="615" font-size="11" text-anchor="middle" fill="#666">→ work-end で squash</text>
  <text x="180" y="635" font-size="11" text-anchor="middle" fill="#666">→ restart と origin 両方に push</text>
  <text x="180" y="657" font-size="11" text-anchor="middle" fill="#c0392b">時刻も Author も会社時間化</text>

  <!-- 家PC (bottom-right) -->
  <rect x="780" y="450" width="280" height="220" fill="#fff" stroke="#e67e22" stroke-width="2.5" rx="10"/>
  <text x="920" y="480" font-size="16" font-weight="bold" text-anchor="middle" fill="#e67e22">🏠 家PC</text>
  <line x1="800" y1="490" x2="1040" y2="490" stroke="#eee"/>
  <text x="920" y="513" font-size="12" text-anchor="middle" fill="#333">初回: /setup-project (h)</text>
  <text x="920" y="535" font-size="12" text-anchor="middle" fill="#333">朝: /sync-home-start</text>
  <text x="920" y="557" font-size="12" text-anchor="middle" fill="#333">夜: /sync-home-end</text>
  <line x1="800" y1="572" x2="1040" y2="572" stroke="#eee"/>
  <text x="920" y="595" font-size="11" text-anchor="middle" fill="#666">local takahashi で作業</text>
  <text x="920" y="615" font-size="11" text-anchor="middle" fill="#666">→ sync-home-end で origin に push</text>
  <text x="920" y="635" font-size="11" text-anchor="middle" fill="#666">→ restart には触らない</text>
  <text x="920" y="657" font-size="11" text-anchor="middle" fill="#27ae60">タイムスタンプは会社で消える</text>

  <!-- ===== Arrows ===== -->
  <!-- 会社PC ↔ RESTART -->
  <path d="M 180 450 L 180 270" stroke="#27ae60" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>
  <rect x="100" y="320" width="160" height="60" fill="#e8f8ef" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="180" y="338" font-size="11" font-weight="bold" text-anchor="middle" fill="#155724">work-end (push)</text>
  <text x="180" y="354" font-size="10" text-anchor="middle" fill="#155724">restart/takahashi に</text>
  <text x="180" y="368" font-size="10" text-anchor="middle" fill="#155724">squash済を force push</text>

  <path d="M 240 270 L 240 450" stroke="#3498db" stroke-width="2.5" fill="none" marker-end="url(#arrB)"/>
  <rect x="280" y="320" width="60" height="60" fill="#e3f2fd" stroke="#3498db" stroke-width="1.5" rx="6"/>
  <text x="310" y="345" font-size="10" font-weight="bold" text-anchor="middle" fill="#1565c0">work-</text>
  <text x="310" y="358" font-size="10" font-weight="bold" text-anchor="middle" fill="#1565c0">start</text>
  <text x="310" y="372" font-size="9" text-anchor="middle" fill="#1565c0">pull main</text>

  <!-- setup-project (会社): clone restart -->
  <path d="M 320 200 L 130 440" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrK)" stroke-dasharray="6,3"/>
  <rect x="195" y="295" width="125" height="22" fill="#fff" stroke="#555" stroke-width="1" rx="4"/>
  <text x="257" y="310" font-size="10" font-weight="bold" text-anchor="middle" fill="#444">setup-project (c) clone</text>

  <!-- 会社PC ↔ origin -->
  <path d="M 320 555 L 780 555" stroke="#27ae60" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>
  <rect x="475" y="525" width="150" height="22" fill="#e8f8ef" stroke="#27ae60" stroke-width="1.5" rx="4"/>
  <text x="550" y="540" font-size="11" font-weight="bold" text-anchor="middle" fill="#155724">work-end → origin push</text>

  <path d="M 780 590 L 320 590" stroke="#3498db" stroke-width="2.5" fill="none" marker-end="url(#arrB)"/>
  <rect x="475" y="603" width="150" height="22" fill="#e3f2fd" stroke="#3498db" stroke-width="1.5" rx="4"/>
  <text x="550" y="618" font-size="11" font-weight="bold" text-anchor="middle" fill="#1565c0">work-start ← origin pull</text>

  <!-- origin ↔ 家PC -->
  <path d="M 920 270 L 920 450" stroke="#e67e22" stroke-width="2.5" fill="none" marker-end="url(#arrO)"/>
  <rect x="775" y="320" width="140" height="60" fill="#fff3cd" stroke="#e67e22" stroke-width="1.5" rx="6"/>
  <text x="845" y="338" font-size="11" font-weight="bold" text-anchor="middle" fill="#856404">sync-home-start</text>
  <text x="845" y="354" font-size="10" text-anchor="middle" fill="#856404">git reset --hard</text>
  <text x="845" y="368" font-size="10" text-anchor="middle" fill="#856404">origin/main の鏡に</text>

  <path d="M 980 450 L 980 270" stroke="#27ae60" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>
  <rect x="935" y="320" width="120" height="60" fill="#e8f8ef" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="995" y="338" font-size="11" font-weight="bold" text-anchor="middle" fill="#155724">sync-home-end</text>
  <text x="995" y="354" font-size="10" text-anchor="middle" fill="#155724">origin/main に</text>
  <text x="995" y="368" font-size="10" text-anchor="middle" fill="#155724">push</text>

  <!-- setup-project (家): clone origin -->
  <path d="M 780 200 L 1015 440" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arrK)" stroke-dasharray="6,3"/>
  <rect x="800" y="295" width="125" height="22" fill="#fff" stroke="#555" stroke-width="1" rx="4"/>
  <text x="862" y="310" font-size="10" font-weight="bold" text-anchor="middle" fill="#444">setup-project (h) clone</text>

  <!-- ===== Center merge note ===== -->
  <rect x="400" y="180" width="380" height="220" fill="#fffbe6" stroke="#fadb14" stroke-width="2" rx="10"/>
  <text x="590" y="208" font-size="14" font-weight="bold" text-anchor="middle" fill="#664d03">🔀 マージはどこで起きる？</text>
  <line x1="420" y1="218" x2="760" y2="218" stroke="#eee"/>
  <text x="590" y="240" font-size="12" font-weight="bold" text-anchor="middle" fill="#664d03">① RESTART 側で起きる</text>
  <text x="590" y="258" font-size="10" text-anchor="middle" fill="#664d03">RESTARTさんが各人のブランチを main に統合</text>
  <text x="590" y="272" font-size="10" text-anchor="middle" fill="#664d03">→ ALLA（全員統合）誕生</text>
  <text x="590" y="295" font-size="12" font-weight="bold" text-anchor="middle" fill="#664d03">② 会社PC 側で起きる</text>
  <text x="590" y="313" font-size="10" text-anchor="middle" fill="#664d03">/work-start で restart/main + origin/main を pull</text>
  <text x="590" y="327" font-size="10" text-anchor="middle" fill="#664d03">→ 競合あれば「競合解決して」と言う</text>
  <text x="590" y="350" font-size="12" font-weight="bold" text-anchor="middle" fill="#664d03">③ 家PC 側ではマージ起きない</text>
  <text x="590" y="368" font-size="10" text-anchor="middle" fill="#664d03">/sync-home-start は reset --hard なので強制同期</text>
  <text x="590" y="382" font-size="10" text-anchor="middle" fill="#664d03">→ 家ローカルは origin/main の鏡</text>

  <!-- ===== Bottom: skill reference ===== -->
  <rect x="40" y="700" width="1020" height="230" fill="#fff" stroke="#bbb" stroke-width="1.5" rx="10"/>
  <text x="550" y="725" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">📚 スキル一覧と役割</text>

  <!-- Row 1: pc-init -->
  <rect x="60" y="740" width="220" height="80" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1.5" rx="6"/>
  <text x="170" y="760" font-size="13" font-weight="bold" text-anchor="middle" fill="#6a1b9a">⚙️ /pc-init</text>
  <text x="170" y="778" font-size="10" text-anchor="middle" fill="#444">PC1台につき1回</text>
  <text x="170" y="794" font-size="10" text-anchor="middle" fill="#444">git config / gh / 認証</text>
  <text x="170" y="810" font-size="10" text-anchor="middle" fill="#444">~/.claude/skills/ 確認</text>

  <rect x="300" y="740" width="220" height="80" fill="#fff3cd" stroke="#fadb14" stroke-width="1.5" rx="6"/>
  <text x="410" y="760" font-size="13" font-weight="bold" text-anchor="middle" fill="#664d03">📦 /setup-project</text>
  <text x="410" y="778" font-size="10" text-anchor="middle" fill="#444">プロジェクト毎に1回</text>
  <text x="410" y="794" font-size="10" text-anchor="middle" fill="#444">会社：restart からclone</text>
  <text x="410" y="810" font-size="10" text-anchor="middle" fill="#444">家：origin からclone</text>

  <rect x="540" y="740" width="220" height="80" fill="#e3f2fd" stroke="#3498db" stroke-width="1.5" rx="6"/>
  <text x="650" y="760" font-size="13" font-weight="bold" text-anchor="middle" fill="#1565c0">☀️ /work-start (会社・朝)</text>
  <text x="650" y="778" font-size="10" text-anchor="middle" fill="#444">restart/main を pull</text>
  <text x="650" y="794" font-size="10" text-anchor="middle" fill="#444">origin/main を pull</text>
  <text x="650" y="810" font-size="10" text-anchor="middle" fill="#444">競合あれば対話で解決</text>

  <rect x="780" y="740" width="220" height="80" fill="#e8f8ef" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="890" y="760" font-size="13" font-weight="bold" text-anchor="middle" fill="#155724">🌙 /work-end (会社・夕方)</text>
  <text x="890" y="778" font-size="10" text-anchor="middle" fill="#444">squash + force push</text>
  <text x="890" y="794" font-size="10" text-anchor="middle" fill="#444">restart/takahashi へ</text>
  <text x="890" y="810" font-size="10" text-anchor="middle" fill="#444">origin/main へ</text>

  <!-- Row 2: sync skills -->
  <rect x="300" y="830" width="220" height="80" fill="#fff3cd" stroke="#e67e22" stroke-width="1.5" rx="6"/>
  <text x="410" y="850" font-size="13" font-weight="bold" text-anchor="middle" fill="#856404">🏠 /sync-home-start (家・朝)</text>
  <text x="410" y="868" font-size="10" text-anchor="middle" fill="#444">git fetch origin</text>
  <text x="410" y="884" font-size="10" text-anchor="middle" fill="#444">git reset --hard</text>
  <text x="410" y="900" font-size="10" text-anchor="middle" fill="#444">origin の鏡に強制同期</text>

  <rect x="540" y="830" width="220" height="80" fill="#fff3cd" stroke="#e67e22" stroke-width="1.5" rx="6"/>
  <text x="650" y="850" font-size="13" font-weight="bold" text-anchor="middle" fill="#856404">🌃 /sync-home-end (家・夜)</text>
  <text x="650" y="868" font-size="10" text-anchor="middle" fill="#444">通常コミット</text>
  <text x="650" y="884" font-size="10" text-anchor="middle" fill="#444">origin/main へ push</text>
  <text x="650" y="900" font-size="10" text-anchor="middle" fill="#444">restart には触らない</text>

  <rect x="780" y="830" width="220" height="80" fill="#fce4ec" stroke="#c0392b" stroke-width="1.5" rx="6"/>
  <text x="890" y="850" font-size="13" font-weight="bold" text-anchor="middle" fill="#c0392b">🛡️ pre-push hook</text>
  <text x="890" y="868" font-size="10" text-anchor="middle" fill="#444">.git/hooks/pre-push</text>
  <text x="890" y="884" font-size="10" text-anchor="middle" fill="#444">restart/main(master) 宛は</text>
  <text x="890" y="900" font-size="10" text-anchor="middle" fill="#444">構造的にブロック</text>

  <!-- legend home setup-project highlight -->
  <rect x="60" y="830" width="220" height="80" fill="#fffbe6" stroke="#fadb14" stroke-width="2" rx="6"/>
  <text x="170" y="850" font-size="12" font-weight="bold" text-anchor="middle" fill="#664d03">💡 家 setup-project の動き</text>
  <text x="170" y="868" font-size="10" text-anchor="middle" fill="#444">① origin から clone（SSA取得）</text>
  <text x="170" y="884" font-size="10" text-anchor="middle" fill="#444">② restart を remote に追加</text>
  <text x="170" y="900" font-size="10" text-anchor="middle" fill="#444">③ ローカルブランチ作成</text>
</svg>
