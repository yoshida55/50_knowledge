<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" font-family="'Segoe UI', sans-serif">
  <rect width="1000" height="1500" fill="#fafafa"/>

  <defs>
    <marker id="arrowDown" markerWidth="12" markerHeight="12" refX="6" refY="11" orient="auto">
      <path d="M0,0 L12,0 L6,11 z" fill="#444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- ============ TITLE ============ -->
  <text x="500" y="35" font-size="22" font-weight="bold" text-anchor="middle" fill="#222">2つの流れ比較：マージ後にsetup vs マージ前にsetup</text>
  <text x="500" y="62" font-size="12" text-anchor="middle" fill="#666">SS=初期 / A=自分の追加 / B,C=他メンバー / SSA=自分の作業 / ALLA=全員マージ統合</text>

  <!-- ====================================================== -->
  <!-- ============ FLOW 1: NORMAL (After Merge) ============ -->
  <!-- ====================================================== -->
  <rect x="20" y="85" width="960" height="40" fill="#27ae60" rx="6"/>
  <text x="500" y="111" font-size="17" font-weight="bold" text-anchor="middle" fill="#fff">✅ 通常パターン：RESTARTマージ後 → 家でsetup-project</text>

  <!-- Column Headers -->
  <text x="135" y="155" font-size="13" font-weight="bold" text-anchor="middle" fill="#c0392b">🌐 RESTART</text>
  <text x="365" y="155" font-size="13" font-weight="bold" text-anchor="middle" fill="#27ae60">🏢 会社PC</text>
  <text x="595" y="155" font-size="13" font-weight="bold" text-anchor="middle" fill="#8e44ad">💾 origin</text>
  <text x="830" y="155" font-size="13" font-weight="bold" text-anchor="middle" fill="#e67e22">🏠 家PC</text>

  <!-- ▼ STEP 1 -->
  <rect x="20" y="170" width="80" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
  <text x="60" y="210" font-size="13" font-weight="bold" text-anchor="middle" fill="#1976d2">STEP</text>
  <text x="60" y="230" font-size="20" font-weight="bold" text-anchor="middle" fill="#1976d2">1</text>

  <rect x="110" y="170" width="200" height="80" fill="#fff" stroke="#c0392b" stroke-width="1.5" rx="6"/>
  <text x="210" y="195" font-size="11" text-anchor="middle">main: SS</text>
  <text x="210" y="215" font-size="11" text-anchor="middle">takahashi: SSA</text>
  <text x="210" y="237" font-size="10" text-anchor="middle" fill="#888">(あなたの作業がpush済)</text>

  <rect x="320" y="170" width="200" height="80" fill="#fff" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="420" y="205" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">local: SSA</text>
  <text x="420" y="230" font-size="10" text-anchor="middle" fill="#888">(会社で A 追加→work-end)</text>

  <rect x="530" y="170" width="200" height="80" fill="#fff" stroke="#8e44ad" stroke-width="1.5" rx="6"/>
  <text x="630" y="205" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">main: SSA</text>
  <text x="630" y="230" font-size="10" text-anchor="middle" fill="#888">(自分のGitHubバックアップ)</text>

  <rect x="740" y="170" width="200" height="80" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3" rx="6"/>
  <text x="840" y="215" font-size="12" text-anchor="middle" fill="#999">(まだセットアップ前)</text>

  <!-- Arrow + Event -->
  <line x1="500" y1="260" x2="500" y2="290" stroke="#444" stroke-width="2" marker-end="url(#arrowDown)"/>
  <rect x="320" y="295" width="360" height="35" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5" rx="6"/>
  <text x="500" y="318" font-size="13" font-weight="bold" text-anchor="middle" fill="#856404">🎉 RESTARTさんがマージを実行</text>

  <!-- ▼ STEP 2 -->
  <rect x="20" y="345" width="80" height="80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
  <text x="60" y="385" font-size="13" font-weight="bold" text-anchor="middle" fill="#1976d2">STEP</text>
  <text x="60" y="405" font-size="20" font-weight="bold" text-anchor="middle" fill="#1976d2">2</text>

  <rect x="110" y="345" width="200" height="80" fill="#e8f8ef" stroke="#c0392b" stroke-width="1.5" rx="6"/>
  <text x="210" y="375" font-size="14" font-weight="bold" text-anchor="middle" fill="#27ae60">main: ALLA</text>
  <text x="210" y="395" font-size="11" text-anchor="middle">takahashi: SSA</text>
  <text x="210" y="415" font-size="10" text-anchor="middle" fill="#888">(全員統合済)</text>

  <rect x="320" y="345" width="200" height="80" fill="#fff" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="420" y="380" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">local: SSA</text>
  <text x="420" y="405" font-size="10" text-anchor="middle" fill="#888">(変化なし)</text>

  <rect x="530" y="345" width="200" height="80" fill="#fff" stroke="#8e44ad" stroke-width="1.5" rx="6"/>
  <text x="630" y="380" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">main: SSA</text>
  <text x="630" y="405" font-size="10" text-anchor="middle" fill="#888">(変化なし)</text>

  <rect x="740" y="345" width="200" height="80" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3" rx="6"/>
  <text x="840" y="390" font-size="12" text-anchor="middle" fill="#999">(まだセットアップ前)</text>

  <line x1="500" y1="435" x2="500" y2="465" stroke="#444" stroke-width="2" marker-end="url(#arrowDown)"/>
  <rect x="320" y="470" width="360" height="35" fill="#d4edda" stroke="#28a745" stroke-width="1.5" rx="6"/>
  <text x="500" y="493" font-size="13" font-weight="bold" text-anchor="middle" fill="#155724">🏠 帰宅後 → 家で /setup-project 実行</text>

  <!-- ▼ STEP 3 -->
  <rect x="20" y="520" width="80" height="90" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="6"/>
  <text x="60" y="565" font-size="13" font-weight="bold" text-anchor="middle" fill="#1976d2">STEP</text>
  <text x="60" y="585" font-size="20" font-weight="bold" text-anchor="middle" fill="#1976d2">3</text>

  <rect x="110" y="520" width="200" height="90" fill="#e8f8ef" stroke="#c0392b" stroke-width="1.5" rx="6"/>
  <text x="210" y="550" font-size="14" font-weight="bold" text-anchor="middle" fill="#27ae60">main: ALLA</text>
  <text x="210" y="570" font-size="11" text-anchor="middle">takahashi: SSA</text>

  <rect x="320" y="520" width="200" height="90" fill="#fff" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="420" y="565" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">local: SSA</text>

  <rect x="530" y="520" width="200" height="90" fill="#fff" stroke="#8e44ad" stroke-width="1.5" rx="6"/>
  <text x="630" y="565" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">main: SSA</text>

  <rect x="740" y="520" width="200" height="90" fill="#e8f8ef" stroke="#e67e22" stroke-width="2.5" rx="6"/>
  <text x="840" y="555" font-size="14" font-weight="bold" text-anchor="middle" fill="#27ae60">local: ALLA ✅</text>
  <text x="840" y="578" font-size="10" text-anchor="middle" fill="#155724">(cloneでmainから取得</text>
  <text x="840" y="592" font-size="10" text-anchor="middle" fill="#155724">→checkout takahashi)</text>

  <!-- Pull arrow from restart to home -->
  <path d="M 310 565 Q 525 640 740 565" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="4,3"/>
  <text x="525" y="645" font-size="11" text-anchor="middle" fill="#27ae60" font-weight="bold">git clone (mainからALLAを取得)</text>

  <!-- Result box -->
  <rect x="110" y="670" width="830" height="50" fill="#d4edda" stroke="#28a745" stroke-width="2" rx="6"/>
  <text x="525" y="693" font-size="14" font-weight="bold" text-anchor="middle" fill="#155724">🎯 結果：家PCが一発で ALLA を取得！sync-home-start すら不要</text>
  <text x="525" y="711" font-size="11" text-anchor="middle" fill="#155724">restart/main 自体が ALLA なので、cloneだけで最新統合状態が手に入る</text>

  <!-- ============ DIVIDER ============ -->
  <line x1="20" y1="755" x2="980" y2="755" stroke="#999" stroke-width="2" stroke-dasharray="8,5"/>

  <!-- ============================================================ -->
  <!-- ============ FLOW 2: PRE-MERGE (Before Merge) ============== -->
  <!-- ============================================================ -->
  <rect x="20" y="775" width="960" height="40" fill="#c0392b" rx="6"/>
  <text x="500" y="801" font-size="17" font-weight="bold" text-anchor="middle" fill="#fff">⚠ 異常パターン：RESTARTマージ前 → 家でsetup-project</text>

  <!-- Column Headers -->
  <text x="135" y="845" font-size="13" font-weight="bold" text-anchor="middle" fill="#c0392b">🌐 RESTART</text>
  <text x="365" y="845" font-size="13" font-weight="bold" text-anchor="middle" fill="#27ae60">🏢 会社PC</text>
  <text x="595" y="845" font-size="13" font-weight="bold" text-anchor="middle" fill="#8e44ad">💾 origin</text>
  <text x="830" y="845" font-size="13" font-weight="bold" text-anchor="middle" fill="#e67e22">🏠 家PC</text>

  <!-- ▼ STEP 1 (same as above) -->
  <rect x="20" y="860" width="80" height="80" fill="#fce4ec" stroke="#c2185b" stroke-width="2" rx="6"/>
  <text x="60" y="900" font-size="13" font-weight="bold" text-anchor="middle" fill="#c2185b">STEP</text>
  <text x="60" y="920" font-size="20" font-weight="bold" text-anchor="middle" fill="#c2185b">1</text>

  <rect x="110" y="860" width="200" height="80" fill="#fff" stroke="#c0392b" stroke-width="1.5" rx="6"/>
  <text x="210" y="885" font-size="11" text-anchor="middle">main: SS</text>
  <text x="210" y="905" font-size="11" text-anchor="middle">takahashi: SSA</text>
  <text x="210" y="927" font-size="10" text-anchor="middle" fill="#888">(マージはまだ未実行)</text>

  <rect x="320" y="860" width="200" height="80" fill="#fff" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="420" y="895" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">local: SSA</text>
  <text x="420" y="920" font-size="10" text-anchor="middle" fill="#888">(会社で A 追加→work-end)</text>

  <rect x="530" y="860" width="200" height="80" fill="#fff" stroke="#8e44ad" stroke-width="1.5" rx="6"/>
  <text x="630" y="895" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">main: SSA</text>

  <rect x="740" y="860" width="200" height="80" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3" rx="6"/>
  <text x="840" y="905" font-size="12" text-anchor="middle" fill="#999">(まだセットアップ前)</text>

  <line x1="500" y1="950" x2="500" y2="980" stroke="#444" stroke-width="2" marker-end="url(#arrowDown)"/>
  <rect x="280" y="985" width="440" height="35" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5" rx="6"/>
  <text x="500" y="1008" font-size="13" font-weight="bold" text-anchor="middle" fill="#721c24">🏠 マージを待たずに帰宅 → 家で /setup-project 実行</text>

  <!-- ▼ STEP 2 -->
  <rect x="20" y="1035" width="80" height="90" fill="#fce4ec" stroke="#c2185b" stroke-width="2" rx="6"/>
  <text x="60" y="1080" font-size="13" font-weight="bold" text-anchor="middle" fill="#c2185b">STEP</text>
  <text x="60" y="1100" font-size="20" font-weight="bold" text-anchor="middle" fill="#c2185b">2</text>

  <rect x="110" y="1035" width="200" height="90" fill="#fff" stroke="#c0392b" stroke-width="1.5" rx="6"/>
  <text x="210" y="1065" font-size="11" text-anchor="middle">main: SS</text>
  <text x="210" y="1085" font-size="11" text-anchor="middle">takahashi: SSA</text>

  <rect x="320" y="1035" width="200" height="90" fill="#fff" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="420" y="1080" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">local: SSA</text>

  <rect x="530" y="1035" width="200" height="90" fill="#fff" stroke="#8e44ad" stroke-width="1.5" rx="6"/>
  <text x="630" y="1080" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">main: SSA</text>

  <rect x="740" y="1035" width="200" height="90" fill="#fff3cd" stroke="#e67e22" stroke-width="2.5" rx="6"/>
  <text x="840" y="1068" font-size="14" font-weight="bold" text-anchor="middle" fill="#c0392b">local: SS ⚠</text>
  <text x="840" y="1090" font-size="10" text-anchor="middle" fill="#856404">(restart/main がまだSSなので</text>
  <text x="840" y="1104" font-size="10" text-anchor="middle" fill="#856404">cloneしてもSSしか取れない)</text>
  <text x="840" y="1118" font-size="10" text-anchor="middle" fill="#c0392b">⚠ Aすら入ってない！</text>

  <line x1="500" y1="1135" x2="500" y2="1165" stroke="#444" stroke-width="2" marker-end="url(#arrowDown)"/>
  <rect x="280" y="1170" width="440" height="35" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5" rx="6"/>
  <text x="500" y="1193" font-size="13" font-weight="bold" text-anchor="middle" fill="#856404">🛡️ 救済策：すぐ /sync-home-start でorigin/mainから自分の作業を回収</text>

  <!-- ▼ STEP 3 -->
  <rect x="20" y="1220" width="80" height="90" fill="#fce4ec" stroke="#c2185b" stroke-width="2" rx="6"/>
  <text x="60" y="1265" font-size="13" font-weight="bold" text-anchor="middle" fill="#c2185b">STEP</text>
  <text x="60" y="1285" font-size="20" font-weight="bold" text-anchor="middle" fill="#c2185b">3</text>

  <rect x="110" y="1220" width="200" height="90" fill="#fff" stroke="#c0392b" stroke-width="1.5" rx="6"/>
  <text x="210" y="1255" font-size="11" text-anchor="middle">main: SS</text>
  <text x="210" y="1275" font-size="11" text-anchor="middle">takahashi: SSA</text>
  <text x="210" y="1295" font-size="10" text-anchor="middle" fill="#888">(マージ依然なし)</text>

  <rect x="320" y="1220" width="200" height="90" fill="#fff" stroke="#27ae60" stroke-width="1.5" rx="6"/>
  <text x="420" y="1265" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">local: SSA</text>

  <rect x="530" y="1220" width="200" height="90" fill="#fff" stroke="#8e44ad" stroke-width="1.5" rx="6"/>
  <text x="630" y="1265" font-size="13" font-weight="bold" text-anchor="middle" fill="#d35400">main: SSA</text>

  <rect x="740" y="1220" width="200" height="90" fill="#e8f8ef" stroke="#e67e22" stroke-width="2.5" rx="6"/>
  <text x="840" y="1255" font-size="14" font-weight="bold" text-anchor="middle" fill="#27ae60">local: SSA ✅</text>
  <text x="840" y="1278" font-size="10" text-anchor="middle" fill="#155724">(originから自分のAを回収)</text>
  <text x="840" y="1298" font-size="10" text-anchor="middle" fill="#c0392b">⚠ ただしALLAではない</text>

  <!-- Pull arrow from origin to home -->
  <path d="M 730 1265 L 740 1265" stroke="#e67e22" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- Result box -->
  <rect x="110" y="1335" width="830" height="80" fill="#fff3cd" stroke="#ffc107" stroke-width="2" rx="6"/>
  <text x="525" y="1360" font-size="14" font-weight="bold" text-anchor="middle" fill="#856404">⚠ 結果：家PCは SSA で作業継続するしかない（ALLAが世に無いから）</text>
  <text x="525" y="1383" font-size="11" text-anchor="middle" fill="#856404">他メンバーの作業（B, C）はマージ後の次回会社サイクルで取り込み</text>
  <text x="525" y="1402" font-size="11" text-anchor="middle" fill="#856404">マージ → 翌日会社 /work-start → /work-end → 帰宅後 /sync-home-start でようやく ALLA 到達</text>

  <!-- Bottom note -->
  <text x="500" y="1450" font-size="12" text-anchor="middle" fill="#444" font-weight="bold">💡 つまり「マージタイミング」次第で、家でALLAを取れるか・SSAだけかが決まる</text>
  <text x="500" y="1475" font-size="11" text-anchor="middle" fill="#777">マージ後にsetupすれば一発でALLA／マージ前にsetupした場合は次の会社サイクル待ち</text>
</svg>
