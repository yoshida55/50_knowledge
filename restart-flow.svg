<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="900" height="760" fill="#fafafa"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e67e22"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" font-size="20" font-weight="bold" text-anchor="middle" fill="#222">データの流れ：マージ前 vs マージ後</text>

  <!-- ==================== PHASE 1 ==================== -->
  <text x="450" y="72" font-size="16" font-weight="bold" text-anchor="middle" fill="#c0392b">⚠ マージ前：ALLA は世の中に存在しない</text>

  <!-- RESTART -->
  <rect x="30" y="95" width="180" height="115" fill="#fff" stroke="#c0392b" stroke-width="2.5" rx="8"/>
  <text x="120" y="118" font-size="14" font-weight="bold" text-anchor="middle">🌐 RESTART</text>
  <line x1="50" y1="128" x2="190" y2="128" stroke="#eee"/>
  <text x="120" y="148" font-size="12" text-anchor="middle">main: SS</text>
  <text x="120" y="168" font-size="12" text-anchor="middle">takahashi: SSA</text>
  <text x="120" y="195" font-size="11" text-anchor="middle" fill="#888">(まだ未マージ)</text>

  <!-- 会社PC -->
  <rect x="240" y="95" width="180" height="115" fill="#fff" stroke="#27ae60" stroke-width="2.5" rx="8"/>
  <text x="330" y="118" font-size="14" font-weight="bold" text-anchor="middle">🏢 会社PC</text>
  <line x1="260" y1="128" x2="400" y2="128" stroke="#eee"/>
  <text x="330" y="155" font-size="15" text-anchor="middle" font-weight="bold" fill="#d35400">local: SSA</text>
  <text x="330" y="188" font-size="11" text-anchor="middle" fill="#888">(A追加→work-end済)</text>

  <!-- origin -->
  <rect x="450" y="95" width="180" height="115" fill="#fff" stroke="#8e44ad" stroke-width="2.5" rx="8"/>
  <text x="540" y="118" font-size="14" font-weight="bold" text-anchor="middle">💾 origin</text>
  <text x="540" y="134" font-size="11" text-anchor="middle" fill="#888">(自分のGitHub)</text>
  <text x="540" y="160" font-size="15" text-anchor="middle" font-weight="bold" fill="#d35400">main: SSA</text>
  <text x="540" y="188" font-size="11" text-anchor="middle" fill="#888">(自分用バックアップ)</text>

  <!-- 家PC -->
  <rect x="660" y="95" width="180" height="115" fill="#fff" stroke="#e67e22" stroke-width="2.5" rx="8"/>
  <text x="750" y="118" font-size="14" font-weight="bold" text-anchor="middle">🏠 家PC</text>
  <line x1="680" y1="128" x2="820" y2="128" stroke="#eee"/>
  <text x="750" y="155" font-size="15" text-anchor="middle" font-weight="bold" fill="#d35400">local: SSA</text>
  <text x="750" y="188" font-size="11" text-anchor="middle" fill="#888">(sync-home-start済)</text>

  <!-- Arrows P1 -->
  <path d="M 240 145 L 215 145" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="227" y="138" font-size="10" text-anchor="middle" fill="#27ae60">push</text>

  <path d="M 420 160 L 450 160" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="435" y="155" font-size="10" text-anchor="middle" fill="#27ae60">push</text>

  <path d="M 630 160 L 660 160" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="645" y="155" font-size="10" text-anchor="middle" fill="#e67e22">pull</text>

  <!-- Phase 1 Conclusion -->
  <rect x="80" y="225" width="740" height="55" fill="#fff3cd" stroke="#ffc107" stroke-width="2" rx="8"/>
  <text x="450" y="252" font-size="14" font-weight="bold" text-anchor="middle" fill="#856404">❌ ALLA はどこにも存在しない → 家で取れるのは「自分の作業 SSA」だけ</text>
  <text x="450" y="270" font-size="11" text-anchor="middle" fill="#856404">他メンバー（yamada=SSB, satou=SSC）も各自のブランチにあるだけで、合算された ALLA は未生成</text>

  <!-- Divider -->
  <line x1="50" y1="305" x2="850" y2="305" stroke="#bbb" stroke-dasharray="6,4"/>

  <!-- ==================== MERGE EVENT ==================== -->
  <rect x="280" y="320" width="340" height="40" fill="#27ae60" rx="20"/>
  <text x="450" y="346" font-size="15" font-weight="bold" text-anchor="middle" fill="#fff">🎉 RESTART がマージ実行 → ALLA 誕生</text>

  <!-- ==================== PHASE 2 ==================== -->
  <text x="450" y="395" font-size="16" font-weight="bold" text-anchor="middle" fill="#27ae60">✅ マージ後：ALLA が「会社経由」で順番に伝播</text>

  <!-- RESTART -->
  <rect x="30" y="415" width="180" height="115" fill="#e8f8ef" stroke="#c0392b" stroke-width="2.5" rx="8"/>
  <text x="120" y="438" font-size="14" font-weight="bold" text-anchor="middle">🌐 RESTART</text>
  <line x1="50" y1="448" x2="190" y2="448" stroke="#eee"/>
  <text x="120" y="470" font-size="15" font-weight="bold" text-anchor="middle" fill="#27ae60">main: ALLA</text>
  <text x="120" y="490" font-size="11" text-anchor="middle">takahashi: SSA</text>
  <text x="120" y="510" font-size="10" text-anchor="middle" fill="#888">(全員のが統合)</text>

  <!-- 会社PC -->
  <rect x="240" y="415" width="180" height="115" fill="#e8f8ef" stroke="#27ae60" stroke-width="2.5" rx="8"/>
  <text x="330" y="438" font-size="14" font-weight="bold" text-anchor="middle">🏢 会社PC</text>
  <line x1="260" y1="448" x2="400" y2="448" stroke="#eee"/>
  <text x="330" y="475" font-size="15" font-weight="bold" text-anchor="middle" fill="#27ae60">local: ALLA</text>
  <text x="330" y="505" font-size="11" text-anchor="middle" fill="#888">(/work-start で pull)</text>

  <!-- origin -->
  <rect x="450" y="415" width="180" height="115" fill="#e8f8ef" stroke="#8e44ad" stroke-width="2.5" rx="8"/>
  <text x="540" y="438" font-size="14" font-weight="bold" text-anchor="middle">💾 origin</text>
  <text x="540" y="454" font-size="11" text-anchor="middle" fill="#888">(自分のGitHub)</text>
  <text x="540" y="480" font-size="15" font-weight="bold" text-anchor="middle" fill="#27ae60">main: ALLA</text>
  <text x="540" y="510" font-size="11" text-anchor="middle" fill="#888">(/work-end で push)</text>

  <!-- 家PC -->
  <rect x="660" y="415" width="180" height="115" fill="#e8f8ef" stroke="#e67e22" stroke-width="2.5" rx="8"/>
  <text x="750" y="438" font-size="14" font-weight="bold" text-anchor="middle">🏠 家PC</text>
  <line x1="680" y1="448" x2="820" y2="448" stroke="#eee"/>
  <text x="750" y="475" font-size="15" font-weight="bold" text-anchor="middle" fill="#27ae60">local: ALLA</text>
  <text x="750" y="505" font-size="11" text-anchor="middle" fill="#888">(/sync-home-start)</text>

  <!-- Arrows P2 with steps -->
  <path d="M 210 460 L 240 460" stroke="#27ae60" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <circle cx="225" cy="445" r="10" fill="#27ae60"/>
  <text x="225" y="449" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">1</text>

  <path d="M 420 460 L 450 460" stroke="#27ae60" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <circle cx="435" cy="445" r="10" fill="#27ae60"/>
  <text x="435" y="449" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">2</text>

  <path d="M 630 460 L 660 460" stroke="#e67e22" stroke-width="3" fill="none" marker-end="url(#arrowOrange)"/>
  <circle cx="645" cy="445" r="10" fill="#e67e22"/>
  <text x="645" y="449" font-size="11" font-weight="bold" text-anchor="middle" fill="#fff">3</text>

  <!-- Phase 2 Timeline -->
  <rect x="80" y="555" width="740" height="80" fill="#d4edda" stroke="#28a745" stroke-width="2" rx="8"/>
  <text x="450" y="580" font-size="14" font-weight="bold" text-anchor="middle" fill="#155724">📅 ALLA が家に届くまでの流れ</text>
  <text x="200" y="605" font-size="12" text-anchor="middle" fill="#155724">①翌朝 会社で</text>
  <text x="200" y="622" font-size="13" font-weight="bold" text-anchor="middle" fill="#155724">/work-start</text>

  <text x="450" y="605" font-size="12" text-anchor="middle" fill="#155724">②同日夕方 会社で</text>
  <text x="450" y="622" font-size="13" font-weight="bold" text-anchor="middle" fill="#155724">/work-end</text>

  <text x="700" y="605" font-size="12" text-anchor="middle" fill="#155724">③帰宅後 家で</text>
  <text x="700" y="622" font-size="13" font-weight="bold" text-anchor="middle" fill="#155724">/sync-home-start</text>

  <!-- Bottom notes -->
  <text x="450" y="670" font-size="12" font-weight="bold" text-anchor="middle" fill="#444">💡 「家に直接ALLAが届く」道は無い。常に「会社PC経由」で伝播する</text>
  <text x="450" y="692" font-size="11" text-anchor="middle" fill="#777">＝マージされた当日に家にいると、その日中はALLAを取得できない（仕様）</text>
  <text x="450" y="714" font-size="10" text-anchor="middle" fill="#999">※ 例外：家から手動で git pull restart main すれば直接取得可（通常は推奨しない）</text>
  <text x="450" y="738" font-size="10" text-anchor="middle" fill="#999">SS=初期コード / SSA=自分(A)追加版 / ALLA=全員マージ統合版</text>
</svg>
