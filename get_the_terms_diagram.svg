<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420" font-family="'Meiryo', 'Yu Gothic', sans-serif">

  <!-- 背景 -->
  <rect width="720" height="420" fill="#f9f9f9" rx="8"/>

  <!-- タイトル -->
  <text x="360" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">get_the_terms() の構造</text>

  <!-- ===== 左ブロック：カスタム投稿タイプ ===== -->
  <rect x="30" y="50" width="180" height="180" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="72" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="bold">カスタム投稿タイプ</text>
  <text x="120" y="88" text-anchor="middle" font-size="10" fill="#1e40af">制作実績（works）</text>

  <!-- 緑の記事エリア -->
  <rect x="45" y="100" width="150" height="110" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="120" y="118" text-anchor="middle" font-size="10" fill="#15803d" font-weight="bold">② 投稿タイプの一覧</text>

  <!-- 記事カード -->
  <rect x="55" y="125" width="130" height="25" rx="4" fill="#4ade80" stroke="#16a34a" stroke-width="1"/>
  <text x="120" y="142" text-anchor="middle" font-size="10" fill="#14532d">記事A（ID: 101）</text>

  <rect x="55" y="155" width="130" height="25" rx="4" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="120" y="172" text-anchor="middle" font-size="10" fill="#14532d" font-weight="bold">→ 今の記事（ループ中）</text>

  <rect x="55" y="185" width="130" height="20" rx="4" fill="#4ade80" stroke="#16a34a" stroke-width="1"/>
  <text x="120" y="199" text-anchor="middle" font-size="10" fill="#14532d">記事C（ID: 103）</text>

  <!-- get_the_ID ラベル -->
  <rect x="45" y="218" width="150" height="22" rx="4" fill="#1d4ed8" opacity="0.9"/>
  <text x="120" y="233" text-anchor="middle" font-size="11" fill="white" font-weight="bold">get_the_ID()</text>

  <!-- ===== 右上ブロック：タクソノミー ===== -->
  <rect x="490" y="50" width="200" height="80" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  <text x="590" y="75" text-anchor="middle" font-size="11" fill="#9a3412" font-weight="bold">カスタムタクソノミー</text>
  <text x="590" y="92" text-anchor="middle" font-size="12" fill="#9a3412" font-weight="bold">'works-category'</text>
  <text x="590" y="112" text-anchor="middle" font-size="10" fill="#c2410c">← 第2引数に指定</text>

  <!-- ===== 右下ブロック：ターム ===== -->
  <rect x="430" y="210" width="260" height="130" rx="8" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <text x="560" y="232" text-anchor="middle" font-size="11" fill="#15803d" font-weight="bold">③ タームの一覧（取得結果）</text>

  <rect x="440" y="242" width="72" height="30" rx="6" fill="#fb923c" stroke="#ea580c" stroke-width="1.5"/>
  <text x="476" y="262" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Web制作</text>

  <rect x="522" y="242" width="72" height="30" rx="6" fill="#fb923c" stroke="#ea580c" stroke-width="1.5"/>
  <text x="558" y="262" text-anchor="middle" font-size="10" fill="white" font-weight="bold">ロゴ制作</text>

  <rect x="604" y="242" width="72" height="30" rx="6" fill="#fb923c" stroke="#ea580c" stroke-width="1.5"/>
  <text x="640" y="262" text-anchor="middle" font-size="10" fill="white" font-weight="bold">グラフィック</text>

  <!-- $terms ラベル -->
  <rect x="480" y="285" width="160" height="22" rx="4" fill="#16a34a" opacity="0.9"/>
  <text x="560" y="300" text-anchor="middle" font-size="11" fill="white" font-weight="bold">$terms に配列で入る</text>

  <text x="560" y="328" text-anchor="middle" font-size="10" fill="#15803d">foreach で1つずつ取り出す</text>
  <text x="560" y="343" text-anchor="middle" font-size="10" fill="#15803d">→ $term->name で名前取得</text>

  <!-- ===== 矢印：左→右上 ===== -->
  <line x1="210" y1="100" x2="485" y2="85" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="340" y="78" text-anchor="middle" font-size="9" fill="#6b7280">CPT UIで紐付け</text>

  <!-- ===== 矢印：記事→ターム ===== -->
  <line x1="210" y1="167" x2="425" y2="265" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="310" y="195" text-anchor="middle" font-size="9" fill="#1d4ed8">get_the_ID()</text>
  <text x="310" y="207" text-anchor="middle" font-size="9" fill="#1d4ed8">で記事を特定</text>

  <!-- ===== 矢印：タクソノミー→ターム ===== -->
  <line x1="560" y1="130" x2="560" y2="205" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="580" y="172" font-size="9" fill="#ea580c">絞り込み</text>

  <!-- ===== 下部：コード ===== -->
  <rect x="30" y="355" width="660" height="50" rx="6" fill="#1e1e1e"/>
  <text x="360" y="374" text-anchor="middle" font-size="11" fill="#9cdcfe">$terms</text>
  <text x="360" y="374" text-anchor="middle" font-size="11" fill="#d4d4d4" dx="30"> = </text>
  <text x="425" y="374" text-anchor="start" font-size="11" fill="#dcdcaa">get_the_terms</text>
  <text x="545" y="374" text-anchor="start" font-size="11" fill="#d4d4d4">( </text>
  <text x="558" y="374" text-anchor="start" font-size="11" fill="#4ec9b0">get_the_ID()</text>
  <text x="648" y="374" text-anchor="start" font-size="11" fill="#d4d4d4">, </text>
  <text x="660" y="374" text-anchor="start" font-size="11" fill="#ce9178">'works-category'</text>

  <!-- コード下注釈 -->
  <text x="100" y="395" text-anchor="middle" font-size="9" fill="#9cdcfe">↑ 左の緑・記事ID</text>
  <text x="370" y="395" text-anchor="middle" font-size="9" fill="#4ec9b0">↑ 今の記事のID</text>
  <text x="590" y="395" text-anchor="middle" font-size="9" fill="#ce9178">↑ 右上・タクソノミースラッグ</text>

  <!-- 矢印マーカー -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ea580c"/>
    </marker>
  </defs>

</svg>
