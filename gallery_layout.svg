<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="sans-serif">
  <!-- タイトル -->
  <text x="350" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">2列レイアウト + object-fit: cover の仕組み</text>

  <!-- 全体の枠（親コンテナ） -->
  <rect x="30" y="50" width="640" height="180" rx="8" fill="#f0f4ff" stroke="#aac" stroke-width="1.5"/>
  <text x="50" y="72" font-size="13" fill="#556">親コンテナ（ul / display: flex; flex-wrap: wrap;）</text>

  <!-- 左カラム .gallery_item -->
  <rect x="50" y="85" width="290" height="130" rx="6" fill="#fff" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="60" y="105" font-size="12" fill="#4a90d9" font-weight="bold">.gallery_item（li）width: 48%</text>
  <!-- 左画像 -->
  <rect x="70" y="115" width="250" height="85" rx="4" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="195" y="155" text-anchor="middle" font-size="11" fill="#155724">.gallery_img（img）</text>
  <text x="195" y="172" text-anchor="middle" font-size="10" fill="#155724">width:100% / height:250px</text>

  <!-- 右カラム .gallery_item -->
  <rect x="360" y="85" width="290" height="130" rx="6" fill="#fff" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="370" y="105" font-size="12" fill="#4a90d9" font-weight="bold">.gallery_item（li）width: 48%</text>
  <!-- 右画像 -->
  <rect x="380" y="115" width="250" height="85" rx="4" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="505" y="155" text-anchor="middle" font-size="11" fill="#155724">.gallery_img（img）</text>
  <text x="505" y="172" text-anchor="middle" font-size="10" fill="#155724">width:100% / height:250px</text>

  <!-- 隙間の注釈 -->
  <line x1="342" y1="90" x2="342" y2="210" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="348" y="220" font-size="10" fill="#e74c3c">← 残り4%が隙間</text>

  <!-- object-fit 説明セクション -->
  <text x="350" y="270" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">object-fit: cover の動き</text>

  <!-- Before: 元画像（縦長） -->
  <rect x="50" y="290" width="120" height="170" rx="4" fill="#ffeeba" stroke="#ffc107" stroke-width="1.5"/>
  <text x="110" y="310" text-anchor="middle" font-size="11" fill="#856404">元画像（縦長）</text>
  <rect x="70" y="320" width="80" height="120" rx="2" fill="#856404" opacity="0.3"/>
  <text x="110" y="385" text-anchor="middle" font-size="30" fill="#856404">🏔</text>

  <!-- 矢印 -->
  <text x="210" y="380" font-size="28" fill="#333">➡</text>

  <!-- After: cover適用後 -->
  <rect x="250" y="310" width="180" height="100" rx="4" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="340" y="335" text-anchor="middle" font-size="11" fill="#155724">cover適用後</text>
  <text x="340" y="370" text-anchor="middle" font-size="28" fill="#155724">🏔</text>
  <text x="340" y="395" text-anchor="middle" font-size="10" fill="#155724">枠に合わせて拡大、はみ出しカット</text>

  <!-- はみ出しの説明 -->
  <rect x="265" y="300" width="10" height="120" fill="#e74c3c" opacity="0.2"/>
  <rect x="415" y="300" width="10" height="120" fill="#e74c3c" opacity="0.2"/>
  <text x="260" y="298" font-size="9" fill="#e74c3c">カット</text>
  <text x="408" y="298" font-size="9" fill="#e74c3c">カット</text>

  <!-- Before: 元画像（横長） -->
  <rect x="480" y="290" width="180" height="170" rx="4" fill="#ffeeba" stroke="#ffc107" stroke-width="1.5"/>
  <text x="570" y="310" text-anchor="middle" font-size="11" fill="#856404">元画像（横長）でも</text>
  <rect x="490" y="320" width="160" height="60" rx="2" fill="#856404" opacity="0.3"/>
  <text x="570" y="355" text-anchor="middle" font-size="22" fill="#856404">🌅</text>
  <text x="570" y="410" text-anchor="middle" font-size="12" fill="#28a745" font-weight="bold">→ 同じ枠に収まる！</text>

  <!-- まとめ -->
  <rect x="50" y="470" width="600" height="25" rx="4" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1"/>
  <text x="350" y="487" text-anchor="middle" font-size="12" fill="#2c3e50" font-weight="bold">✅ 縦長でも横長でも、同じサイズの枠にきれいに収まる → それが object-fit: cover</text>
</svg>